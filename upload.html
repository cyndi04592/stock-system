<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>美股神器 - 重新導向中...</title>
<!-- 此頁已棄用,自動跳轉到 GAS 原生上傳頁(09_api.gs getUploadPageHTML) -->
<!-- v2.0 (2026/05/05):修 ORCX/SMUP 大屠殺案,改為 redirect -->
<style>
:root{
  --bg:#020A14;--card:#071525;
  --gold:#F5A623;--cyan:#00D4FF;--gray:#6E89A6;--white:#E8F4FD;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--white);
  font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.box{
  text-align:center;
  background:var(--card);
  border:1px solid rgba(0,212,255,0.12);
  border-radius:16px;
  padding:32px 24px;
  max-width:380px;
  width:100%;
}
.title{
  font-size:20px;
  font-weight:900;
  color:var(--gold);
  letter-spacing:3px;
  margin-bottom:8px;
}
.sub{
  font-size:11px;
  color:var(--gray);
  letter-spacing:2px;
  margin-bottom:24px;
}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(0,212,255,0.2);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{
  font-size:13px;
  color:var(--white);
  line-height:1.7;
  margin-bottom:14px;
}
.fallback-link{
  display:inline-block;
  margin-top:14px;
  padding:9px 18px;
  background:rgba(0,212,255,0.1);
  border:1px solid rgba(0,212,255,0.3);
  border-radius:8px;
  color:var(--cyan);
  text-decoration:none;
  font-size:12px;
  font-weight:700;
}
.fallback-link:hover{background:rgba(0,212,255,0.2);}
.tip{
  font-size:10px;
  color:var(--gray);
  margin-top:18px;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="box">
  <div class="title">美股神器</div>
  <div class="sub">STOCK SYSTEM v5.0</div>

  <div class="spinner"></div>

  <div class="msg">
    重新導向到上傳頁...<br>
    若 3 秒內未自動跳轉,請點下方按鈕
  </div>

  <a href="#" id="manualLink" class="fallback-link">手動進入上傳頁</a>

  <div class="tip">建議從 LINE「上傳」按鈕進入以保留 User ID</div>
</div>

<script>
// GAS 原生上傳頁(09_api.gs getUploadPageHTML)
// 視覺與功能完整,真實接通 Vision API,無任何寫死資料
const GAS_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

// 從 query string 拿 user id 並帶過去
function getUid() {
  return new URLSearchParams(window.location.search).get('id') || '';
}

const uid = getUid();
const target = uid ? (GAS_UPLOAD_URL + '?id=' + encodeURIComponent(uid)) : GAS_UPLOAD_URL;

document.getElementById('manualLink').href = target;

// 自動跳轉(0.8 秒讓使用者看到品牌畫面)
setTimeout(() => {
  window.location.replace(target);
}, 800);
</script>

<!-- noscript fallback -->
<noscript>
  <meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec">
  <p style="text-align:center;padding:20px;">
    請啟用 JavaScript,或<a href="https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec" style="color:#00D4FF;">點此手動進入</a>
  </p>
</noscript>
</body>
</html>
