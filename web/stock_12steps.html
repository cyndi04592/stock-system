<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股神器 5 式投票分析</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020A14;--card:#071525;--card2:#0A1E35;
  --gold:#F5A623;--cyan:#00D4FF;--green:#00FF88;
  --red:#FF3366;--orange:#FF6B35;--purple:#A855F7;
  --teal:#00CDB7;
  --white:#E8F4FD;--gray:#4A6580;--lgray:#8BA8C4;
  --border:rgba(0,212,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
.page{max-width:1140px;margin:0 auto;padding:20px;}

/* ───── 頂欄 ───── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;color:var(--gold);letter-spacing:2px;}
.logo span{color:var(--cyan);}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray);}

/* ───── 輸入區 ───── */
.input-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:20px;}
.input-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-label{font-size:10px;color:var(--gray);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
.stock-input{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;width:155px;letter-spacing:2px;transition:border-color 0.2s;}
.stock-input:focus{outline:none;border-color:var(--cyan);}
.market-select{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;}
.market-select:focus{outline:none;border-color:var(--cyan);}
.analyze-btn{padding:10px 24px;background:var(--cyan);border:none;border-radius:8px;color:#020A14;font-weight:900;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Orbitron',sans-serif;letter-spacing:1px;white-space:nowrap;}
.analyze-btn:hover{opacity:0.85;transform:translateY(-1px);}
.analyze-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.quick-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;align-items:center;}
.quick-label{font-size:10px;color:var(--gray);font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.quick-tag{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--lgray);font-size:10px;cursor:pointer;transition:all 0.2s;font-family:'JetBrains Mono',monospace;}
.quick-tag:hover{color:var(--white);border-color:rgba(255,255,255,0.25);}
.quick-tag.holding{border-color:rgba(245,166,35,0.35);color:#C8A060;}
.quick-tag.holding:hover{color:var(--gold);border-color:var(--gold);}
.quick-tag.market{border-color:rgba(0,212,255,0.25);color:#60A8C8;}
.quick-tag.market:hover{color:var(--cyan);border-color:var(--cyan);}

/* ───── User 狀態列 ───── */
.user-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-radius:8px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  margin-bottom:20px;font-size:11px;font-family:'JetBrains Mono',monospace;
}
.user-bar .lbl{color:var(--gray);}
.user-bar .val{color:var(--cyan);}

/* ───── Loading ───── */
.loading{text-align:center;padding:48px;display:none;}
.loading.show{display:block;}
.loading-text{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);letter-spacing:2px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ───── Error ───── */
.error-box{
  display:none;padding:20px;border-radius:12px;
  background:rgba(255,51,102,0.08);border:1px solid rgba(255,51,102,0.3);
  color:#C85070;font-size:13px;line-height:1.6;
}
.error-box.show{display:block;}
.error-box strong{display:block;margin-bottom:6px;font-family:'Orbitron',sans-serif;color:var(--red);font-size:11px;letter-spacing:2px;}

/* ───── 結論區 ───── */
.section-title{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

.verdict-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:20px;}
.verdict-layout{display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
.verdict-circle{width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--border);flex-shrink:0;transition:border-color 0.5s;}
.verdict-num{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;line-height:1;}
.verdict-den{font-size:9px;color:var(--gray);font-family:'JetBrains Mono',monospace;margin-top:3px;letter-spacing:1px;}
.verdict-info{flex:1;min-width:200px;}
.verdict-label{font-size:14px;font-weight:700;margin-bottom:8px;}
.verdict-bar-outer{display:flex;height:8px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,0.05);margin-bottom:8px;}
.vb-bull{background:var(--green);transition:width 0.8s ease;}
.vb-neutral{background:var(--gray);transition:width 0.8s ease;}
.vb-bear{background:var(--red);transition:width 0.8s ease;}
.verdict-detail{font-size:10px;color:var(--gray);font-family:'JetBrains Mono',monospace;}

.action-box{margin-top:16px;padding:14px 18px;border-radius:10px;font-size:12px;line-height:1.8;border-left:3px solid;}
.ab-buy{background:rgba(0,255,136,0.06);border-color:var(--green);color:#60C890;}
.ab-watch{background:rgba(0,212,255,0.06);border-color:var(--cyan);color:#60A8C8;}
.ab-caution{background:rgba(255,107,53,0.06);border-color:var(--orange);color:#C87040;}
.ab-danger{background:rgba(255,51,102,0.06);border-color:var(--red);color:#C85070;}
.ab-title{font-weight:700;margin-bottom:4px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;font-size:10px;}

/* ───── 5 式投票卡 ───── */
.votes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:780px){.votes-grid{grid-template-columns:1fr;}}

.vote-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;
  position:relative;animation:fadeUp 0.35s ease both;
  transition:transform 0.2s,border-color 0.2s;
}
.vote-card:hover{transform:translateY(-2px);}
.vote-card.v-bullish{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.04);}
.vote-card.v-bearish{border-color:rgba(255,51,102,0.4);background:rgba(255,51,102,0.04);}
.vote-card.v-neutral{border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.03);}
.vote-card.v-abstain{border-color:rgba(74,101,128,0.3);opacity:0.65;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.vote-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.vote-num{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;
  flex-shrink:0;border:1px solid var(--border);background:var(--card2);color:var(--gray);
}
.vote-card.v-bullish .vote-num{background:rgba(0,255,136,0.15);color:var(--green);border-color:rgba(0,255,136,0.3);}
.vote-card.v-bearish .vote-num{background:rgba(255,51,102,0.15);color:var(--red);border-color:rgba(255,51,102,0.3);}
.vote-card.v-neutral .vote-num{background:rgba(0,212,255,0.12);color:var(--cyan);border-color:rgba(0,212,255,0.25);}

.vote-title{font-size:13px;font-weight:700;color:var(--white);line-height:1.3;}
.vote-source{font-size:10px;color:var(--gray);font-family:'JetBrains Mono',monospace;margin-top:2px;}

.vote-status{
  position:absolute;top:14px;right:16px;
  font-size:10px;font-weight:900;
  font-family:'Orbitron',sans-serif;letter-spacing:1.5px;
  padding:3px 10px;border-radius:5px;
}
.vote-card.v-bullish .vote-status{background:rgba(0,255,136,0.15);color:var(--green);}
.vote-card.v-bearish .vote-status{background:rgba(255,51,102,0.15);color:var(--red);}
.vote-card.v-neutral .vote-status{background:rgba(0,212,255,0.12);color:var(--cyan);}
.vote-card.v-abstain .vote-status{background:rgba(74,101,128,0.2);color:var(--gray);}

.vote-confidence{
  display:flex;align-items:center;gap:8px;
  margin:8px 0 10px;
  font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--gray);
}
.confidence-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.confidence-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.vote-card.v-bullish .confidence-fill{background:var(--green);}
.vote-card.v-bearish .confidence-fill{background:var(--red);}
.vote-card.v-neutral .confidence-fill{background:var(--cyan);}
.vote-card.v-abstain .confidence-fill{background:var(--gray);}

.vote-reason{
  font-size:11px;color:var(--lgray);line-height:1.6;
  padding-top:10px;border-top:1px dashed var(--border);
}

/* ───── 系統資訊區(底部) ───── */
.sys-info{
  padding:12px 16px;border-radius:8px;
  background:rgba(0,0,0,0.25);border:1px solid var(--border);
  font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--gray);
  display:flex;gap:18px;flex-wrap:wrap;
}
.sys-info span{color:var(--lgray);}

/* ───── 提示空白頁 ───── */
.placeholder{
  text-align:center;padding:60px 20px;color:var(--gray);
  font-size:13px;line-height:1.8;
}
.placeholder-icon{
  font-family:'Orbitron',sans-serif;font-size:14px;
  color:var(--cyan);letter-spacing:3px;margin-bottom:14px;
}
</style>
</head>
<body>
<div class="page">

<!-- ───── 頂欄 ───── -->
<div class="top-bar">
  <div class="logo">5式 <span>VOTING ANALYSIS</span></div>
  <div class="clock" id="clock">--:--:--  TW</div>
</div>

<!-- ───── User 狀態列 ───── -->
<div class="user-bar">
  <div><span class="lbl">USER</span> <span class="val" id="userIdShort">-</span></div>
  <div><span class="lbl">API</span> <span class="val" id="apiStatus">就緒</span></div>
</div>

<!-- ───── 輸入區 ───── -->
<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <div class="input-label">股票代號</div>
      <input class="stock-input" id="tickerInput" placeholder="ORCX" value="ORCX" onkeydown="if(event.key==='Enter')analyze()">
    </div>
    <div class="input-group">
      <div class="input-label">市場</div>
      <select class="market-select" id="marketSelect">
        <option value="US">美股  US</option>
        <option value="TW">台股  TW</option>
      </select>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">ANALYZE</button>
  </div>
  <div class="quick-row">
    <span class="quick-label">QUICK :</span>
    <button class="quick-tag holding" onclick="quickStock('ORCX','US')">ORCX 333股</button>
    <button class="quick-tag holding" onclick="quickStock('SMUP','US')">SMUP 1072股</button>
    <button class="quick-tag market" onclick="quickStock('SPY','US')">SPY 大盤</button>
    <button class="quick-tag market" onclick="quickStock('QQQ','US')">QQQ 科技</button>
    <button class="quick-tag market" onclick="quickStock('VIX','US')">VIX 恐慌</button>
  </div>
</div>

<!-- ───── Loading ───── -->
<div class="loading" id="loading">
  <div class="loading-text">5 式投票分析中 ...</div>
</div>

<!-- ───── Error ───── -->
<div class="error-box" id="errorBox">
  <strong>ERROR</strong>
  <span id="errorMsg">-</span>
</div>

<!-- ───── 預設提示 ───── -->
<div class="placeholder" id="placeholder">
  <div class="placeholder-icon">READY</div>
  輸入股票代號或點擊 Quick 標籤<br>
  系統會調用 5 式投票引擎分析多空訊號
</div>

<!-- ───── 主體 ───── -->
<div id="resultArea" style="display:none">

  <!-- 結論區 -->
  <div class="verdict-panel">
    <div class="section-title">FINAL VERDICT</div>
    <div class="verdict-layout">
      <div class="verdict-circle" id="verdictCircle">
        <div class="verdict-num" id="verdictNum">--</div>
        <div class="verdict-den">VOTES</div>
      </div>
      <div class="verdict-info">
        <div class="verdict-label" id="verdictLabel">分析中</div>
        <div class="verdict-bar-outer">
          <div class="vb-bull" id="vbBull" style="width:0%"></div>
          <div class="vb-neutral" id="vbNeutral" style="width:0%"></div>
          <div class="vb-bear" id="vbBear" style="width:0%"></div>
        </div>
        <div class="verdict-detail" id="verdictDetail">--</div>
      </div>
    </div>
    <div class="action-box ab-watch" id="actionBox">
      <div class="ab-title">操作建議</div>分析中...
    </div>
  </div>

  <!-- 5 式投票卡 -->
  <div class="section-title">5 STRATEGIES VOTING</div>
  <div class="votes-grid" id="votesGrid"></div>

  <!-- 系統資訊 -->
  <div class="sys-info" id="sysInfo">
    <div>SYMBOL <span id="siSymbol">-</span></div>
    <div>PRICE <span id="siPrice">-</span></div>
    <div>SOURCE <span id="siSource">10_voting.gs v1.0</span></div>
    <div>TIME <span id="siTime">-</span></div>
  </div>

</div>

</div>

<script>
// ════════════════════════════════════
// 設定區
// ════════════════════════════════════

// 09_api.gs 部署的 Web App 網址(第八輪交接卡)
const API_URL = "https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec";

// 預設 userId(RA 自己),可從 URL ?id=Uxxx 覆蓋
const DEFAULT_USER_ID = "U657f8f31abbff90fdbc1ef4a34e16c0c";

// 5 式對應的中文名 + 來源
const STRATEGY_META = {
  premium:  { num:"01", name:"老練股神  PREMIUM", source:"開盤溢價率公式" },
  candy:    { num:"02", name:"CINDY  CANDY",        source:"藍色中樞 + 鐘底 + 強度三要件" },
  substack: { num:"03", name:"大叔  SUBSTACK",      source:"Substack 基本面分析" },
  whale:    { num:"04", name:"鯨魚偵測  WHALE",     source:"暗池 + 大單監控" },
  crash:    { num:"05", name:"大跌心智圖  CRASH",   source:"總經 + 三問判斷" }
};

// 五式排序(顯示用)
const STRATEGY_ORDER = ["premium", "candy", "substack", "whale", "crash"];

// ════════════════════════════════════
// 取 userId(URL 參數優先,否則用預設)
// ════════════════════════════════════
function getUserId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || DEFAULT_USER_ID;
}

// ════════════════════════════════════
// JSONP 跨域呼叫(GitHub Pages → Apps Script)
// ════════════════════════════════════
let _jsonpCounter = 0;

function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cbName = "jsonpCb_" + (++_jsonpCounter) + "_" + Date.now();
    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error("API 逾時(30秒),請檢查網路或 GAS 部署狀態"));
    }, 30000);

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.parentNode.removeChild(s);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    const qs = Object.keys(params).map(k =>
      encodeURIComponent(k) + "=" + encodeURIComponent(params[k])
    ).join("&");

    const script = document.createElement("script");
    script.id = cbName;
    script.src = url + "?" + qs + "&callback=" + cbName;
    script.onerror = () => {
      cleanup();
      reject(new Error("API 連線失敗,請檢查 GAS 部署網址"));
    };
    document.body.appendChild(script);
  });
}

// ════════════════════════════════════
// 主分析函式
// ════════════════════════════════════
async function analyze() {
  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  const market = document.getElementById("marketSelect").value;
  if (!ticker) {
    showError("請輸入股票代號");
    return;
  }

  // UI 切換到 loading
  document.getElementById("placeholder").style.display = "none";
  document.getElementById("errorBox").classList.remove("show");
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("loading").classList.add("show");
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("apiStatus").textContent = "分析中…";
  document.getElementById("apiStatus").style.color = "var(--orange)";

  try {
    const userId = getUserId();
    const data = await jsonp(API_URL, {
      action: "analyze",
      userId: userId,
      symbol: ticker,
      market: market
    });

    // 後端錯誤
    if (!data || data.success === false) {
      throw new Error((data && data.error) || "API 回傳異常");
    }

    renderResult(ticker, market, data);
    document.getElementById("apiStatus").textContent = "成功";
    document.getElementById("apiStatus").style.color = "var(--green)";
  } catch (e) {
    showError(e.message || String(e));
    document.getElementById("apiStatus").textContent = "失敗";
    document.getElementById("apiStatus").style.color = "var(--red)";
  } finally {
    document.getElementById("loading").classList.remove("show");
    document.getElementById("analyzeBtn").disabled = false;
  }
}

// ════════════════════════════════════
// 顯示錯誤
// ════════════════════════════════════
function showError(msg) {
  const box = document.getElementById("errorBox");
  document.getElementById("errorMsg").textContent = msg;
  box.classList.add("show");
  document.getElementById("resultArea").style.display = "none";
}

// ════════════════════════════════════
// 渲染結果
// ════════════════════════════════════
function renderResult(ticker, market, data) {
  document.getElementById("resultArea").style.display = "block";

  // 系統資訊
  document.getElementById("siSymbol").textContent = ticker + " (" + market + ")";
  document.getElementById("siPrice").textContent = data.price ? ("$" + data.price) : "N/A";
  document.getElementById("siTime").textContent = new Date().toLocaleTimeString("zh-TW");

  // votes 是物件 { premium:{...}, candy:{...}, ... }
  const votes = data.votes || {};

  // 渲染 5 張卡
  renderVoteCards(votes);

  // 計算結論
  const counts = countVotes(votes);
  renderVerdict(counts, data);
}

// ════════════════════════════════════
// 渲染 5 式卡片
// ════════════════════════════════════
function renderVoteCards(votes) {
  const grid = document.getElementById("votesGrid");
  grid.innerHTML = "";

  STRATEGY_ORDER.forEach((key, i) => {
    const meta = STRATEGY_META[key];
    const v = votes[key] || { vote:"abstain", confidence:0, reason:"後端無資料" };

    const voteVal = (v.vote || "abstain").toLowerCase();
    const conf = Math.max(0, Math.min(100, parseInt(v.confidence) || 0));
    const reason = v.reason || "（無說明）";

    let cls, label;
    if (voteVal === "bullish" || voteVal === "buy" || voteVal === "long") {
      cls = "v-bullish"; label = "看多";
    } else if (voteVal === "bearish" || voteVal === "sell" || voteVal === "short") {
      cls = "v-bearish"; label = "看空";
    } else if (voteVal === "neutral" || voteVal === "hold") {
      cls = "v-neutral"; label = "中性";
    } else {
      cls = "v-abstain"; label = "棄權";
    }

    const card = document.createElement("div");
    card.className = "vote-card " + cls;
    card.style.animationDelay = (i * 0.06) + "s";

    card.innerHTML = `
      <div class="vote-status">${label}</div>
      <div class="vote-header">
        <div class="vote-num">${meta.num}</div>
        <div>
          <div class="vote-title">${meta.name}</div>
          <div class="vote-source">${meta.source}</div>
        </div>
      </div>
      <div class="vote-confidence">
        <span>信心度</span>
        <div class="confidence-bar"><div class="confidence-fill" style="width:${conf}%"></div></div>
        <span>${conf}%</span>
      </div>
      <div class="vote-reason">${escapeHtml(reason)}</div>
    `;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════
// 計算多空票數
// ════════════════════════════════════
function countVotes(votes) {
  let bull = 0, bear = 0, neutral = 0, abstain = 0;
  STRATEGY_ORDER.forEach(k => {
    const v = votes[k];
    if (!v) { abstain++; return; }
    const vv = (v.vote || "abstain").toLowerCase();
    if (vv === "bullish" || vv === "buy" || vv === "long") bull++;
    else if (vv === "bearish" || vv === "sell" || vv === "short") bear++;
    else if (vv === "neutral" || vv === "hold") neutral++;
    else abstain++;
  });
  return { bull, bear, neutral, abstain, total: 5 };
}

// ════════════════════════════════════
// 渲染最終結論
// ════════════════════════════════════
function renderVerdict(counts, data) {
  const { bull, bear, neutral, abstain } = counts;
  const active = bull + bear + neutral; // 不算棄權
  const score = bull - bear; // 多空差

  // 三段條圖
  const total = 5;
  document.getElementById("vbBull").style.width    = (bull / total * 100) + "%";
  document.getElementById("vbNeutral").style.width = ((neutral + abstain) / total * 100) + "%";
  document.getElementById("vbBear").style.width    = (bear / total * 100) + "%";

  // 中央圓圈顯示「多-空」差
  const numEl = document.getElementById("verdictNum");
  const circle = document.getElementById("verdictCircle");
  const labelEl = document.getElementById("verdictLabel");
  const detailEl = document.getElementById("verdictDetail");
  const actionBox = document.getElementById("actionBox");

  numEl.textContent = (score > 0 ? "+" : "") + score;
  detailEl.textContent = `多 ${bull}  空 ${bear}  中 ${neutral}  棄權 ${abstain}`;

  let color, verdictLabel, actionCls, actionTitle, actionText;

  if (score >= 3) {
    color = "var(--green)";
    verdictLabel = "強力看多  STRONG BULLISH";
    actionCls = "ab-buy";
    actionTitle = "操作建議";
    actionText = `5 式中有 ${bull} 式看多,訊號明確。可考慮加倉或建立新倉位,但仍需設停損(建議 -5%~-8%)。`;
  } else if (score >= 1) {
    color = "var(--cyan)";
    verdictLabel = "偏多  BULLISH";
    actionCls = "ab-watch";
    actionTitle = "操作建議";
    actionText = `多空票數偏多(多 ${bull} / 空 ${bear}),訊號傾向看多但未明確。可持倉觀察,新進場小倉試水。`;
  } else if (score === 0 && bull + bear > 0) {
    color = "var(--orange)";
    verdictLabel = "多空平手  NEUTRAL";
    actionCls = "ab-caution";
    actionTitle = "操作建議";
    actionText = `多 ${bull} 票對空 ${bear} 票完全平手,市場分歧。已持倉者建議持有觀察,空倉者不進場。`;
  } else if (score <= -3) {
    color = "var(--red)";
    verdictLabel = "強力看空  STRONG BEARISH";
    actionCls = "ab-danger";
    actionTitle = "風險警示";
    actionText = `5 式中有 ${bear} 式看空,訊號明確偏空。已持倉者考慮減倉或停損,空倉者切勿接刀。`;
  } else if (score <= -1) {
    color = "var(--orange)";
    verdictLabel = "偏空  BEARISH";
    actionCls = "ab-caution";
    actionTitle = "操作建議";
    actionText = `多空票數偏空(多 ${bull} / 空 ${bear}),建議減倉降低風險,或設緊停損。`;
  } else {
    // 全棄權
    color = "var(--gray)";
    verdictLabel = "資料不足  INSUFFICIENT";
    actionCls = "ab-watch";
    actionTitle = "提示";
    actionText = `5 式皆棄權,可能是冷門股或後端資料源有問題。建議手動研究或更換標的。`;
  }

  numEl.style.color = color;
  circle.style.borderColor = color;
  labelEl.style.color = color;
  labelEl.textContent = verdictLabel;

  actionBox.className = "action-box " + actionCls;
  actionBox.innerHTML = `<div class="ab-title">${actionTitle}</div>${actionText}`;
}

// ════════════════════════════════════
// 工具:防 XSS
// ════════════════════════════════════
function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ════════════════════════════════════
// 時鐘
// ════════════════════════════════════
function updateClock() {
  const now = new Date();
  const tw = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Taipei" }));
  const hh = String(tw.getHours()).padStart(2, "0");
  const mm = String(tw.getMinutes()).padStart(2, "0");
  const ss = String(tw.getSeconds()).padStart(2, "0");
  document.getElementById("clock").textContent = `${hh}:${mm}:${ss}  TW`;
}
