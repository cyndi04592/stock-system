<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股神器 - 個股分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#020A14;
  --card:#071525;
  --card2:#0A1E35;
  --gold:#F5A623;
  --cyan:#00D4FF;
  --green:#00FF88;
  --red:#FF3366;
  --orange:#FF6B35;
  --purple:#A855F7;
  --teal:#00CDB7;
  --white:#E8F4FD;
  --gray:#4A6580;
  --lgray:#8BA8C4;
  --border:rgba(0,212,255,0.12);
  --border2:rgba(0,212,255,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;
  position:relative;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,0.05) 0%,transparent 60%);
  pointer-events:none;
  z-index:0;
}
.page{max-width:1140px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* ─── Top Bar ─── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
  flex-wrap:wrap;
  gap:12px;
}
.logo{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;color:var(--gold);letter-spacing:3px;}
.logo span{color:var(--cyan);}
.top-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.usage-pill{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  padding:5px 12px;
  border-radius:14px;
  background:rgba(245,166,35,0.08);
  border:1px solid rgba(245,166,35,0.25);
  color:var(--gold);
  letter-spacing:1px;
}
.usage-pill.unlimited{
  background:rgba(0,255,136,0.08);
  border-color:rgba(0,255,136,0.3);
  color:var(--green);
}
.usage-pill.danger{
  background:rgba(255,51,102,0.08);
  border-color:rgba(255,51,102,0.3);
  color:var(--red);
}
.clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);}

/* ─── 輸入區 ─── */
.input-section{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px 24px;
  margin-bottom:20px;
}
.input-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
.input-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:240px;}
.input-label{
  font-size:10px;color:var(--gray);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1px;text-transform:uppercase;
}
.stock-input{
  background:rgba(0,0,0,0.4);
  border:1px solid var(--border);
  border-radius:8px;
  padding:11px 14px;
  color:var(--white);
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  font-weight:700;
  letter-spacing:2px;
  width:100%;
  transition:border-color 0.2s;
}
.stock-input:focus{outline:none;border-color:var(--cyan);}
.stock-input::placeholder{color:var(--gray);font-weight:400;letter-spacing:0.5px;font-size:12px;}

.analyze-btn{
  padding:11px 28px;
  background:var(--cyan);
  border:none;border-radius:8px;
  color:#020A14;font-weight:900;font-size:13px;
  cursor:pointer;transition:all 0.2s;
  font-family:'Orbitron',sans-serif;
  letter-spacing:1px;white-space:nowrap;
}
.analyze-btn:hover{opacity:0.85;transform:translateY(-1px);}
.analyze-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ─── QUICK ─── */
.quick-row{
  display:flex;gap:7px;flex-wrap:wrap;
  margin-top:14px;align-items:center;
}
.quick-label{
  font-size:10px;color:var(--gray);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1px;
}
.quick-tag{
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;color:var(--lgray);
  font-size:10px;cursor:pointer;
  transition:all 0.2s;
  font-family:'JetBrains Mono',monospace;
}
.quick-tag:hover{color:var(--white);border-color:rgba(255,255,255,0.25);}
.quick-tag.tw{border-color:rgba(245,166,35,0.3);color:#C8A060;}
.quick-tag.tw:hover{color:var(--gold);border-color:var(--gold);}

/* ─── Loading ─── */
.loading{
  text-align:center;padding:60px 20px;display:none;
}
.loading.show{display:block;}
.loading-text{
  font-family:'Orbitron',sans-serif;
  font-size:13px;color:var(--cyan);

}
.loading-sub{

.error-title{

  font-size:11px;color:var(--red);

}
.error-msg{

  line-height:1.7;
}
.error-hint{
  font-size:11px;color:var(--gray);
  margin-top:8px;
  font-family:'JetBrains Mono',monospace;
}

/* ─── Section Title ─── */
.section-title{
  font-family:'Orbitron',sans-serif;
  font-size:11px;color:var(--gold);
  letter-spacing:3px;
  margin-bottom:14px;

}
.section-title::after{
  content:'';flex:1;height:1px;

/* ─── 摘要卡 ─── */
.summary-panel{

  border-radius:16px;

.summary-head{

.summary-ticker{

.summary-meta{

.summary-meta .pct{font-weight:700;}
.summary-meta .pct.up{color:var(--green);}
.summary-meta .pct.down{color:var(--red);}
.summary-action{

}
.action-badge{

.action-buy{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.3);}
.action-watch{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.3);}
.action-warn{background:rgba(255,107,53,0.1);color:var(--orange);border:1px solid rgba(255,107,53,0.3);}
.action-sell{background:rgba(255,51,102,0.1);color:var(--red);border:1px solid rgba(255,51,102,0.3);}
.action-hold{background:rgba(74,101,128,0.15);color:var(--lgray);border:1px solid rgba(74,101,128,0.3);}
.confidence{

  font-size:10px;color:var(--gray);

}

.tally-row{
  display:flex;gap:10px;

}
.tally-item{

}
.tally-label{color:var(--gray);letter-spacing:1px;}
.tally-num{font-weight:700;}
.tally-bull .tally-num{color:var(--green);}
.tally-bear .tally-num{color:var(--red);}
.tally-neutral .tally-num{color:var(--lgray);}
.tally-abstain .tally-num{color:var(--gray);}

.reason-box{
  margin-top:14px;padding:14px 18px;
  border-radius:10px;
  font-size:12px;line-height:1.8;
  border-left:3px solid;
  background:rgba(0,212,255,0.04);
  border-color:var(--cyan);
  color:#A0C8E0;
}
.reason-title{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:1px;
  margin-bottom:6px;color:var(--cyan);
  font-weight:700;
}

/* ─── 股神分析卡 ─── */
.analysts-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:24px;
}
.analyst-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  transition:all 0.2s;
  animation:fadeUp 0.4s ease both;
  position:relative;
  overflow:hidden;
}
.analyst-card::before{
  content:'';
  position:absolute;top:0;left:0;
  width:3px;height:100%;
  background:var(--accent,var(--gray));
  opacity:0.7;
}
.analyst-card:hover{transform:translateY(-2px);border-color:var(--border2);}

.analyst-card.v-bullish{--accent:var(--green);}
.analyst-card.v-bearish{--accent:var(--red);}
.analyst-card.v-neutral{--accent:var(--lgray);}
.analyst-card.v-abstain{--accent:var(--gray);opacity:0.85;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.analyst-head{
  display:flex;justify-content:space-between;
  align-items:flex-start;gap:10px;margin-bottom:8px;
}
.analyst-name-block{display:flex;flex-direction:column;gap:2px;}
.analyst-name{
  font-size:13px;font-weight:700;color:var(--white);
}
.analyst-key{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--gray);
  letter-spacing:1px;text-transform:uppercase;
}
.vote-tag{
  font-family:'Orbitron',sans-serif;
  font-size:10px;font-weight:900;
  padding:4px 10px;border-radius:5px;
  letter-spacing:1.5px;flex-shrink:0;
}
.v-bullish .vote-tag{background:rgba(0,255,136,0.15);color:var(--green);}
.v-bearish .vote-tag{background:rgba(255,51,102,0.15);color:var(--red);}
.v-neutral .vote-tag{background:rgba(139,168,196,0.15);color:var(--lgray);}
.v-abstain .vote-tag{background:rgba(74,101,128,0.2);color:var(--gray);}

.analyst-conf{
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--gray);
  margin-bottom:8px;
}
.conf-bar-outer{
  flex:1;height:3px;
  background:rgba(255,255,255,0.05);
  border-radius:2px;overflow:hidden;
}
.conf-bar-inner{
  height:100%;
  background:var(--accent,var(--gray));
  border-radius:2px;
  transition:width 0.6s ease;
}

.analyst-note{
  font-size:12px;color:var(--lgray);
  line-height:1.6;
  font-family:'Noto Sans TC',sans-serif;
}

/* ─── Footer ─── */
.footer{
  text-align:center;
  font-size:10px;color:var(--gray);
  font-family:'JetBrains Mono',monospace;
  margin-top:30px;
  letter-spacing:1px;
  padding:14px 0;
  border-top:1px solid var(--border);
}

@media(max-width:780px){
  .analysts-grid{grid-template-columns:1fr;}
  .summary-head{flex-direction:column;align-items:stretch;}
  .summary-action{align-items:flex-start;}
}
</style>

<script>
// ════════════════════════════════════════════════
// 設定
// ════════════════════════════════════════════════
const GAS_API = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

// 從 URL 抓 userId
function getUserId(){
  const m = window.location.search.match(/[?&]id=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}
const USER_ID = getUserId();

// ════════════════════════════════════════════════
// 投票名稱對照(對齊 05_analysis.gs v2.6 VOTE_NAMES)
// ════════════════════════════════════════════════
const VOTE_NAMES = {
  // 美股 6 式
  premium:  '開盤溢價率',
  candy:    'CANDY 戰法',
  whale:    '鯨魚偵測',
  crash:    '大跌警報',
  jiansrc:  '題材熱度',
  substack: '美股大叔',
  // 台股 5 式
  premium_tw:  '開盤溢價率',
  candy_tw:    'CINDY 心法',
  crash_tw:    '大盤情緒',
  cmoney_news: '簡式選股',
  chip_tw_v2:  '集保大戶模型'
};

// 美股 6 式有效 key、台股 5 式有效 key
const US_KEYS = ['premium','candy','whale','crash','jiansrc','substack'];
const TW_KEYS = ['premium_tw','candy_tw','crash_tw','cmoney_news','chip_tw_v2'];

// 票名翻譯
const VOTE_LABEL = {
  bullish:  '看多',
  bearish:  '看空',
  neutral:  '中性',
  abstain:  '棄權',
  long:     '看多',
  short:    '看空'
};

// ACTION 翻譯 + CSS class
const ACTION_STYLE = {
  '加碼':       { cls:'action-buy' },
  '可考慮加碼': { cls:'action-buy' },
  '進場':       { cls:'action-buy' },
  '布局':       { cls:'action-buy' },
  '持有':       { cls:'action-watch' },
  '觀望':       { cls:'action-watch' },
  '觀察':       { cls:'action-watch' },
  '訊號不足':   { cls:'action-hold' },
  '減碼':       { cls:'action-warn' },
  '小幅減倉':   { cls:'action-warn' },
  '警示':       { cls:'action-warn' },
  '警示出場':   { cls:'action-sell' },
  '出場':       { cls:'action-sell' },
  '全出':       { cls:'action-sell' },
  '無法取得':   { cls:'action-hold' }
};
function actionClass(action){
  if(!action) return 'action-hold';
  const a = String(action).trim();
  // 直接找
  if(ACTION_STYLE[a]) return ACTION_STYLE[a].cls;
  // 模糊比
  if(/加碼|進場|布局|做多/.test(a)) return 'action-buy';
  if(/全出|出場|賣出/.test(a)) return 'action-sell';
  if(/減碼|減倉|警示/.test(a)) return 'action-warn';
  if(/持有|觀望|觀察|不足/.test(a)) return 'action-watch';
  return 'action-hold';
}

// ════════════════════════════════════════════════
// 時鐘
// ════════════════════════════════════════════════
function updateClock(){
  const now = new Date();
  const tw = new Date(now.getTime()+(8*60+now.getTimezoneOffset())*60000);
  document.getElementById('clock').textContent =
    tw.toTimeString().slice(0,8)+'  TW';
}
setInterval(updateClock, 1000);
updateClock();

// ════════════════════════════════════════════════
// JSONP 工具(避開 CORS)
// ════════════════════════════════════════════════
function jsonp(url, params, timeout){
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(params)
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    const fullUrl = `${url}?${qs}&callback=${cbName}`;

    const script = document.createElement('script');
    let timer = null;

    function cleanup(){
      if(timer) clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('JSONP 連線失敗(網路或 GAS 端錯誤)'));
    };

    timer = setTimeout(() => {
      cleanup();
      reject(new Error('連線超時(45 秒),請重試'));
    }, timeout || 45000);

    script.src = fullUrl;
    document.head.appendChild(script);
  });
}

// ════════════════════════════════════════════════
// Usage 顯示
// ════════════════════════════════════════════════
function renderUsage(usage){
  const pill = document.getElementById('usagePill');
  if(!usage){
    pill.style.display = 'none';
    return;
  }
  pill.style.display = 'inline-block';
  if(usage.isUnlimited){
    pill.textContent = '∞  ADMIN';
    pill.className = 'usage-pill unlimited';
    return;
  }
  const remaining = usage.remaining || 0;
  const limit = usage.limit || 0;
  pill.textContent = `今日剩餘  ${remaining} / ${limit}`;
  if(remaining <= 3) pill.className = 'usage-pill danger';
  else pill.className = 'usage-pill';
}

// ════════════════════════════════════════════════
// 啟動時抓 usage(讓 admin/vip 一進來就看到剩幾次)
// ════════════════════════════════════════════════
async function fetchUsage(){
  if(!USER_ID) return;
  try{
    const data = await jsonp(GAS_API, {
      action: 'usage',
      id: USER_ID
    }, 8000);
    if(data && data.ok){
      renderUsage(data);
    }
  } catch(e){
    // usage 抓不到不影響主流程
  }
}
fetchUsage();

// ════════════════════════════════════════════════
// 錯誤顯示
// ════════════════════════════════════════════════
function showError(msg, hint){
  document.getElementById('errorMsg').textContent = msg || '未知錯誤';
  document.getElementById('errorHint').textContent = hint || '';
  document.getElementById('errorBox').classList.add('show');
}
function hideError(){
  document.getElementById('errorBox').classList.remove('show');
}

// ════════════════════════════════════════════════
// 主分析流程
// ════════════════════════════════════════════════
async function analyze(){
  const tickerInput = document.getElementById('tickerInput');
  const ticker = tickerInput.value.trim().toUpperCase();
  const btn = document.getElementById('analyzeBtn');

  hideError();

  if(!ticker){
    showError('請先輸入股票代號',
              '美股範例:NVDA、ORCL、TSM    台股範例:0050、00631L、2330');
    return;
  }

  if(!USER_ID){
    showError('沒有 USER ID',
              '請從 LINE Bot @368ceoiv 的「個股分析」按鈕進入此頁,直接打網址沒有身分驗證');
    return;
  }

  // UI 切到 loading
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('loadingSub').textContent = '呼叫 6 套股神交叉分析中(約 10-30 秒)...';
  btn.disabled = true;

  try{
    const data = await jsonp(GAS_API, {
      action: 'analyze',
      id: USER_ID,
      symbol: ticker
    }, 60000);

    document.getElementById('loading').classList.remove('show');
    btn.disabled = false;

    // ─── 守門員回應處理 ───
    if(!data){
      showError('沒收到回應','請稍後再試');
      return;
    }

    // 更新 usage(每次回應都帶)
    if(data.usage) renderUsage(data.usage);

    // 守門員擋下(NOT_ACTIVE / USER_NOT_FOUND / NO_USER_ID)
    if(data.ok === false){
      handleApiError(data, ticker);
      return;
    }

    // 沒 votes(可能後端壞了)
    if(!data.votes){
      showError('後端沒回傳投票資料',
                'data.votes 是空的,請稍後重試或聯繫管理員');
      return;
    }

    renderResult(ticker, data);

  } catch(e){
    document.getElementById('loading').classList.remove('show');
    btn.disabled = false;
    showError('連線失敗:' + (e.message || e),
              '可能原因:網路斷線、GAS 部署過期、或此股票後端尚未支援');
  }
}

// ════════════════════════════════════════════════
// API 錯誤處理(對齊 09_api.gs v3.4 守門員回應)
// ════════════════════════════════════════════════
function handleApiError(data, ticker){
  const code = data.error || '';
  const msg = data.message || '';

  switch(code){
    case 'NO_USER_ID':
      showError('未提供 USER ID',
                '請從 LINE 進入,網址要帶 ?id=Uxxx');
      return;
    case 'USER_NOT_FOUND':
      showError('查無此用戶',
                '請先加 LINE Bot @368ceoiv 並完成註冊');
      return;
    case 'NOT_ACTIVE':
      showError(msg || '帳號目前無法使用此功能',
                `方案:${data.plan || '未知'}  · 私訊 LINE @368ceoiv 處理`);
      return;
    case 'DAILY_LIMIT_EXCEEDED':
      showError(msg || '今日查詢次數已達上限',
                '明日重置,或私訊 LINE @368ceoiv 升級方案');
      if(data.usage) renderUsage(data.usage);
      return;
    case 'TW_NOT_SUPPORTED':
      showError(msg || '台股分析尚未上線',
                '台股投票引擎(14_tw_voting.gs)尚未部署,目前僅支援美股');
      return;
    default:
      showError(msg || code || '未知錯誤',
                ticker ? `代號:${ticker}` : '');
  }
}

// ════════════════════════════════════════════════
// 渲染結果
// ════════════════════════════════════════════════
function renderResult(ticker, data){
  const isTw = TW_KEYS.some(k => data.votes[k]);
  const validKeys = isTw ? TW_KEYS : US_KEYS;

  // 過濾出該市場的有效投票
  const voteEntries = validKeys
    .filter(k => data.votes[k] && typeof data.votes[k].vote !== 'undefined')
    .map(k => ({ key: k, ...data.votes[k] }));

  // 摘要區
  document.getElementById('sumTicker').textContent = data.ticker || ticker;

  // Meta(現價、漲跌)
  const meta = buildMeta(data);
  document.getElementById('sumMeta').innerHTML = meta;

  // ACTION badge
  const action = data.action || '訊號不足';
  const actionEl = document.getElementById('sumAction');
  actionEl.textContent = action;
  actionEl.className = 'action-badge ' + actionClass(action);

  // Confidence(從 conclusion.conf 或最大票的 conf)
  const conf = computeConfidence(data, voteEntries);
  document.getElementById('sumConfidence').textContent =
    `CONFIDENCE  ${Math.round(conf*100)}%`;

  // Tally
  const tally = computeTally(voteEntries);
  renderTally(tally);

  // Reason
  document.getElementById('reasonText').textContent =
    data.reason || '(後端未提供分析說明)';

  // 動態標題
  document.getElementById('analystsTitle').textContent =
    `${voteEntries.length} 套股神分析 · AI 精準交叉驗證`;

  // 6 式卡片
  renderAnalysts(voteEntries);

  document.getElementById('resultArea').style.display = 'block';
  // 滾到結果
  setTimeout(() => {
    document.getElementById('summaryPanel').scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

// ────────────────────────────────────────────────
// Meta 字串(現價 + 漲跌)
// ────────────────────────────────────────────────
function buildMeta(data){
  const parts = [];

  // 從 votes.premium.raw 拿價格(05_analysis.gs/10_voting 結構)
  let price = null, pct = null, pre = null;
  for(const k of ['premium','premium_tw','candy','candy_tw']){
    const v = data.votes[k];
    if(v && v.raw){
      if(typeof v.raw.price === 'number') price = v.raw.price;
      if(typeof v.raw.pct === 'number') pct = v.raw.pct;
      if(typeof v.raw.prePct === 'number') pre = v.raw.prePct;
      if(price !== null) break;
    }
  }

  // 也試試頂層欄位(09_api.gs v3.1.3 標準欄位)
  if(price === null && typeof data.price === 'number') price = data.price;
  if(pct === null && typeof data.pct === 'number') pct = data.pct;

  const isTw = TW_KEYS.some(k => data.votes[k]);
  const cur = isTw ? 'NT$' : '$';

  if(price !== null){
    parts.push(`${cur}${price.toFixed(2)}`);
  }
  if(pct !== null){
    const sign = pct >= 0 ? '+' : '';
    const cls = pct >= 0 ? 'up' : 'down';
    parts.push(`<span class="pct ${cls}">${sign}${pct.toFixed(2)}%</span>`);
  }
  if(pre !== null && Math.abs(pre) > 0.01){
    const sign = pre >= 0 ? '+' : '';
    parts.push(`開盤 ${sign}${pre.toFixed(2)}%`);
  }

  if(parts.length === 0) return '(後端未回傳價格資訊)';
  return parts.join('  ·  ');
}

// ────────────────────────────────────────────────
// Confidence 計算
// ────────────────────────────────────────────────
function computeConfidence(data, voteEntries){
  // 優先吃後端 conclusion.conf
  if(data.conclusion && typeof data.conclusion.conf === 'number'){
    return data.conclusion.conf;
  }
  // 沒有就算「主流票的平均 conf」
  const counts = { bullish:0, bearish:0, neutral:0 };
  voteEntries.forEach(v => {
    const vote = (v.vote === 'long' ? 'bullish' : v.vote === 'short' ? 'bearish' : v.vote);
    if(counts[vote] !== undefined) counts[vote]++;
  });
  // 找主流方向
  let dominant = 'bullish';
  if(counts.bearish > counts.bullish) dominant = 'bearish';
  else if(counts.neutral >= counts.bullish && counts.neutral >= counts.bearish) dominant = 'neutral';

  const dominantVotes = voteEntries.filter(v => {
    const vote = (v.vote === 'long' ? 'bullish' : v.vote === 'short' ? 'bearish' : v.vote);
    return vote === dominant;
  });

  if(dominantVotes.length === 0) return 0;
  const sumConf = dominantVotes.reduce((s,v) => s + (v.conf || 0), 0);
  return sumConf / dominantVotes.length;
}

// ────────────────────────────────────────────────
// Tally(票數統計)
// ────────────────────────────────────────────────
function computeTally(voteEntries){
  const tally = { bullish:0, bearish:0, neutral:0, abstain:0 };
  voteEntries.forEach(v => {
    let vote = v.vote;
    if(vote === 'long') vote = 'bullish';
    if(vote === 'short') vote = 'bearish';
    if(tally[vote] !== undefined) tally[vote]++;
    else tally.abstain++;
  });
  return tally;
}

function renderTally(tally){
  const row = document.getElementById('tallyRow');
  row.innerHTML = `
    <div class="tally-item tally-bull">
      <span class="tally-label">看多</span>
      <span class="tally-num">${tally.bullish}</span>
    </div>
    <div class="tally-item tally-bear">
      <span class="tally-label">看空</span>
      <span class="tally-num">${tally.bearish}</span>
    </div>
    <div class="tally-item tally-neutral">
      <span class="tally-label">中性</span>
      <span class="tally-num">${tally.neutral}</span>
    </div>
    <div class="tally-item tally-abstain">
      <span class="tally-label">棄權</span>
      <span class="tally-num">${tally.abstain}</span>
    </div>
  `;
}

// ────────────────────────────────────────────────
// 渲染 6 式卡片
// ────────────────────────────────────────────────
function renderAnalysts(voteEntries){
  const grid = document.getElementById('analystsGrid');
  grid.innerHTML = '';

  voteEntries.forEach((v, i) => {
    let voteNorm = v.vote;
    if(voteNorm === 'long') voteNorm = 'bullish';
    if(voteNorm === 'short') voteNorm = 'bearish';

    const card = document.createElement('div');
    card.className = 'analyst-card v-' + voteNorm;
    card.style.animationDelay = (i * 0.05) + 's';

    const conf = Math.round((v.conf || 0) * 100);
    const note = (v.note || '(無說明)').toString();
    const safeName = VOTE_NAMES[v.key] || v.key;
    const voteLabel = VOTE_LABEL[v.vote] || v.vote;

    card.innerHTML = `
      <div class="analyst-head">
        <div class="analyst-name-block">
          <div class="analyst-name">${escapeHtml(safeName)}</div>
          <div class="analyst-key">${escapeHtml(v.key)}</div>
        </div>
        <div class="vote-tag">${escapeHtml(voteLabel)}</div>
      </div>
      <div class="analyst-conf">
        <span>CONF</span>
        <div class="conf-bar-outer"><div class="conf-bar-inner" style="width:0%"></div></div>
        <span>${conf}%</span>
      </div>
      <div class="analyst-note">${escapeHtml(note)}</div>
    `;
    grid.appendChild(card);

    // 動畫:延遲後拉滿信心度條
    setTimeout(() => {
      const bar = card.querySelector('.conf-bar-inner');
      if(bar) bar.style.width = conf + '%';
    }, 100 + i * 60);
  });
}

// ────────────────────────────────────────────────
// HTML escape
// ────────────────────────────────────────────────
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// QUICK 按鈕
// ────────────────────────────────────────────────
function quickStock(ticker){
  document.getElementById('tickerInput').value = ticker;
  analyze();
}
