<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5式 VOTING ANALYSIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080F;
  --bg2: #0A0E1A;
  --line: #1a2540;
  --neon-cyan: #00FFD9;
  --neon-pink: #FF2E63;
  --neon-green: #00FF88;
  --neon-yellow: #FFD93D;
  --text: #E8F0FF;
  --text-dim: #6B7A9F;
  --text-faint: #3A4868;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px;
  background-image:
    linear-gradient(rgba(0, 255, 217, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 217, 0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}
.container { max-width: 1100px; margin: 0 auto; }

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.brand {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--text);
}
.brand .nf { color: var(--neon-pink); }
.brand .en { color: var(--neon-cyan); margin-left: 6px; }
.clock {
  font-family: 'JetBrains Mono', monospace;
  color: var(--neon-cyan);
  font-size: 14px;
  letter-spacing: 2px;
}
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan) 20%, var(--neon-cyan) 80%, transparent);
  opacity: 0.4;
  margin-bottom: 20px;
}

.status-bar {
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 12px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  letter-spacing: 1px;
}
.status-bar .label { color: var(--text-dim); }
.status-bar .val { color: var(--text); margin-left: 6px; font-weight: 500; }
.status-bar .ok { color: var(--neon-green); font-weight: 700; }
.status-bar .err { color: var(--neon-pink); font-weight: 700; }

.query-panel {
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 22px 24px;
  margin-bottom: 16px;
}
.query-row {
  display: flex;
  gap: 16px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.field { flex: 1; min-width: 120px; }
.field-narrow { flex: 0 0 110px; }
.field-label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.input, .select {
  width: 100%;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text);
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  outline: none;
  transition: border-color 0.2s;
  text-transform: uppercase;
}
.input:focus, .select:focus { border-color: var(--neon-cyan); }
.select {
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--neon-cyan) 50%), linear-gradient(135deg, var(--neon-cyan) 50%, transparent 50%);
  background-position: calc(100% - 14px) center, calc(100% - 8px) center;
  background-size: 6px 6px;
  background-repeat: no-repeat;
  padding-right: 28px;
}
.btn-analyze {
  background: var(--neon-cyan);
  color: var(--bg);
  border: none;
  padding: 12px 28px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  transition: 0.15s;
}
.btn-analyze:hover { background: #fff; }
.btn-analyze:disabled { background: var(--text-faint); color: var(--text-dim); cursor: not-allowed; }

.quick-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.quick-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.quick-tag {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text);
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 14px;
  transition: 0.15s;
}
.quick-tag:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

.crash-alert {
  background: rgba(255, 46, 99, 0.08);
  border: 1px solid var(--neon-pink);
  padding: 14px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.crash-alert .left {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--neon-pink);
}
.crash-icon {
  width: 22px; height: 22px;
  border: 2px solid var(--neon-pink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: 14px;
  font-weight: 900;
  transform: rotate(45deg);
}
.crash-icon span { transform: rotate(-45deg); }
.crash-alert .desc { color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-weight: 500; letter-spacing: 1px; font-size: 13px; }
.risk-badge {
  background: rgba(255, 46, 99, 0.2);
  color: var(--neon-pink);
  border: 1px solid var(--neon-pink);
  padding: 4px 14px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 3px;
  border-radius: 14px;
}

.section-h {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--neon-cyan);
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-h::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--neon-cyan), transparent);
  opacity: 0.4;
}

.verdict-panel {
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 24px 28px;
  margin-bottom: 8px;
}
.verdict-main {
  display: flex;
  align-items: center;
  gap: 28px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.vote-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 3px solid var(--neon-cyan);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 24px rgba(0, 255, 217, 0.2), inset 0 0 24px rgba(0, 255, 217, 0.06);
  position: relative;
}
.vote-circle::before {
  content: '';
  position: absolute;
  inset: -8px;
  border: 1px solid var(--neon-cyan);
  border-radius: 50%;
  opacity: 0.25;
}
.vote-circle.bullish { border-color: var(--neon-green); box-shadow: 0 0 24px rgba(0, 255, 136, 0.2); }
.vote-circle.bullish::before { border-color: var(--neon-green); }
.vote-circle.bearish { border-color: var(--neon-pink); box-shadow: 0 0 24px rgba(255, 46, 99, 0.2); }
.vote-circle.bearish::before { border-color: var(--neon-pink); }
.vote-circle.neutral { border-color: var(--neon-yellow); box-shadow: 0 0 24px rgba(255, 217, 61, 0.2); }
.vote-circle.neutral::before { border-color: var(--neon-yellow); }
.vote-circle .vote-num {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 36px;
  color: var(--neon-cyan);
  line-height: 1;
}
.vote-circle.bullish .vote-num { color: var(--neon-green); }
.vote-circle.bearish .vote-num { color: var(--neon-pink); }
.vote-circle.neutral .vote-num { color: var(--neon-yellow); }
.vote-circle .vote-lbl {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-top: 4px;
}
.verdict-info { flex: 1; min-width: 280px; }
.verdict-action {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 4px;
  color: var(--neon-cyan);
  margin-bottom: 4px;
}
.verdict-action.bullish { color: var(--neon-green); }
.verdict-action.bearish { color: var(--neon-pink); }
.verdict-action.neutral { color: var(--neon-yellow); }
.verdict-action .zh {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  margin-left: 8px;
  font-weight: 700;
}
.verdict-bar {
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  margin: 14px 0 8px;
}
.verdict-bar > div { height: 100%; }
.bar-bull { background: var(--neon-green); }
.bar-bear { background: var(--neon-pink); }
.bar-neut { background: var(--neon-yellow); }
.bar-abs { background: var(--text-faint); }
.verdict-counts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.verdict-counts span { margin-right: 18px; }
.verdict-counts .n-bull { color: var(--neon-green); font-weight: 700; }
.verdict-counts .n-bear { color: var(--neon-pink); font-weight: 700; }
.verdict-counts .n-neut { color: var(--neon-yellow); font-weight: 700; }
.verdict-counts .n-abs { color: var(--text-dim); font-weight: 700; }

.suggestion-box {
  background: rgba(0, 255, 217, 0.04);
  border-left: 3px solid var(--neon-cyan);
  padding: 16px 20px;
  margin-top: 14px;
}
.suggestion-box .lbl {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.suggestion-box .text {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--neon-cyan);
  margin-bottom: 6px;
}
.suggestion-box .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.info-chip {
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 14px 18px;
  border-left: 3px solid var(--text-faint);
}
.info-chip .ck {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.info-chip .cv {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.info-chip .cs {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

.vote-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  margin-bottom: 10px;
  padding: 16px 20px;
  border-left: 3px solid var(--text-faint);
}
.vote-card.bullish { border-left-color: var(--neon-green); }
.vote-card.bearish { border-left-color: var(--neon-pink); }
.vote-card.neutral { border-left-color: var(--neon-yellow); }
.vote-card.abstain { border-left-color: var(--text-faint); opacity: 0.7; }
.vote-card-h {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.vc-num {
  display: inline-flex;
  width: 32px; height: 32px;
  background: var(--bg);
  border: 1px solid var(--line);
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 13px;
  color: var(--neon-pink);
  align-items: center;
  justify-content: center;
  margin-right: 12px;
  vertical-align: middle;
}
.vc-name {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  display: inline-flex;
  align-items: center;
}
.vc-name .en {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--neon-cyan);
  margin-left: 6px;
}
.vc-sub {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1px;
  margin-left: 44px;
}
.vc-badge {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 5px 14px;
  border: 1px solid;
  border-radius: 12px;
  text-transform: uppercase;
}
.vc-badge .zh { font-family: 'Noto Sans TC', sans-serif; letter-spacing: 1px; margin-left: 4px; }
.vc-badge.bullish { color: var(--neon-green); border-color: var(--neon-green); background: rgba(0, 255, 136, 0.06); }
.vc-badge.bearish { color: var(--neon-pink); border-color: var(--neon-pink); background: rgba(255, 46, 99, 0.06); }
.vc-badge.neutral { color: var(--neon-yellow); border-color: var(--neon-yellow); background: rgba(255, 217, 61, 0.06); }
.vc-badge.abstain { color: var(--text-dim); border-color: var(--line); background: transparent; }
.vc-conf {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 8px;
  letter-spacing: 1px;
}
.vc-note {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  color: var(--text);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
  letter-spacing: 1px;
  line-height: 1.7;
}
.vc-raw {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  letter-spacing: 1px;
  line-height: 1.7;
  word-break: break-all;
}
.reason-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.r-tag {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 10px;
  border: 1px solid;
  letter-spacing: 1px;
}
.r-tag.bull { color: var(--neon-green); border-color: var(--neon-green); background: rgba(0, 255, 136, 0.06); }
.r-tag.bear { color: var(--neon-pink); border-color: var(--neon-pink); background: rgba(255, 46, 99, 0.06); }

.vc-toggle {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--neon-cyan);
  cursor: pointer;
  margin-top: 10px;
  user-select: none;
  text-transform: uppercase;
  display: inline-block;
}
.vc-toggle:hover { color: #fff; }
.sub-list { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
.sub-list.show { display: block; }
.sub-item {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 12px;
  border-bottom: 1px dotted var(--line);
}
.sub-item:last-child { border-bottom: none; }
.sub-name { font-family: 'Noto Sans TC', sans-serif; color: var(--text); letter-spacing: 1px; }
.sub-val { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 1px; }
.sub-val.bullish { color: var(--neon-green); }
.sub-val.bearish { color: var(--neon-pink); }
.sub-val.neutral { color: var(--neon-yellow); }
.sub-val.abstain { color: var(--text-dim); }

.state-box {
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 50px 24px;
  text-align: center;
  margin: 16px 0;
}
.state-box.error { border-color: var(--neon-pink); }
.state-box .msg {
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;
  color: var(--neon-cyan);
  font-size: 14px;
  margin-top: 16px;
}
.state-box.error .msg { color: var(--neon-pink); }
.state-box .sub {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
  letter-spacing: 1px;
  line-height: 1.7;
}
.spinner {
  display: inline-block;
  width: 36px; height: 36px;
  border: 2px solid var(--line);
  border-top-color: var(--neon-cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.back-link {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--neon-cyan);
  text-decoration: none;
  border: 1px solid var(--line);
  padding: 6px 14px;
  display: inline-block;
}
.back-link:hover { border-color: var(--neon-cyan); }
.btn-retry {
  font-family: 'Orbitron', sans-serif;
  background: transparent;
  color: var(--neon-cyan);
  border: 1px solid var(--neon-cyan);
  padding: 8px 20px;
  letter-spacing: 2px;
  cursor: pointer;
  font-size: 12px;
  margin-top: 16px;
}
.btn-retry:hover { background: var(--neon-cyan); color: var(--bg); }

.footer {
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;
  color: var(--text-faint);
  font-size: 10px;
  margin-top: 40px;
  padding: 16px;
}

@media (max-width: 720px) {
  .info-grid { grid-template-columns: 1fr; }
  .verdict-main { gap: 16px; }
  .vote-circle { width: 88px; height: 88px; }
  .vote-circle .vote-num { font-size: 28px; }
  .verdict-action { font-size: 22px; }
  .brand { font-size: 22px; }
  .field-narrow { flex: 1; }
}
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <a href="dashboard_v5.html" class="back-link">◄ DASHBOARD</a>
    <div class="clock" id="clock">--:--:-- TW</div>
  </div>

  <div style="margin: 16px 0 4px;">
    <span class="brand"><span class="nf">5式</span><span class="en">VOTING ANALYSIS</span></span>
  </div>
  <div class="divider"></div>

  <div class="status-bar">
    <div>
      <span class="label">USER</span>
      <span class="val" id="userTag">—</span>
    </div>
    <div>
      <span class="label">API</span>
      <span class="val" id="apiStatus">待命</span>
    </div>
  </div>

  <div class="query-panel">
    <div class="query-row">
      <div class="field">
        <label class="field-label">股票代號 / SYMBOL</label>
        <input type="text" class="input" id="symbolInput" placeholder="ORCX" maxlength="6">
      </div>
      <div class="field-narrow">
        <label class="field-label">市場 / MARKET</label>
        <select class="select" id="marketSelect">
          <option value="US">美股 US</option>
          <option value="TW" disabled>台股 TW</option>
        </select>
      </div>
      <div>
        <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">ANALYZE</button>
      </div>
    </div>
    <div class="quick-row">
      <span class="quick-label">QUICK :</span>
      <span id="quickTags"></span>
    </div>
  </div>

  <div id="crashAlertArea"></div>
  <div id="verdictArea"></div>
  <div id="infoArea"></div>
  <div id="votesArea"></div>

  <div class="state-box" id="stateBox">
    <div class="spinner"></div>
    <div class="msg">SYSTEM READY</div>
    <div class="sub">輸入代號或選 QUICK 開始 5 式分析</div>
  </div>

  <div class="footer">SHENGI v6.3 · POWERED BY GAS + CLAUDE</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

// 純指標白名單(不是 ETF,純看不能買,Quick 永遠允許)
const MARKET_SYMBOLS = ['VIX'];

// v6.3:Quick 預設只放純指標,有持股的用戶會動態 prepend 自己持股
let ALLOWED_SYMBOLS = [...MARKET_SYMBOLS];
let QUICK_LIST = [
  { sym: 'VIX', label: 'VIX 恐慌指數' }
];

const FORMULA = {
  premium: { num: '01', zh: '老練股神', en: 'PREMIUM',  sub: '開盤溢價率公式' },
  candy:   { num: '02', zh: 'CANDY',   en: 'STRATEGY', sub: '7 子式加權評分' },
  whale:   { num: '03', zh: '鯨魚偵測', en: 'WHALE',    sub: '主力進出量能' },
  crash:   { num: '04', zh: '大跌警報', en: 'CRASH',    sub: '心智圖四象限' },
  jiansrc: { num: '05', zh: '熱題材',   en: 'JIANSRC',  sub: '白名單 + 過熱警戒' }
};
const ORDER = ['premium', 'candy', 'whale', 'crash', 'jiansrc'];
const SUB_LBL = {
  s1_ma_hold:   '5 均線守住',
  s2_main_line: '主力趨勢線',
  s3_strength:  '強度三要件',
  s6_volratio:  '量比異常',
  s7_macd_div:  'MACD 背離',
  s8_arrange:   '均線排列',
  s9_chip:      '籌碼集中度'
};
const VOTE_LBL = {
  bullish: { zh: '看多', en: 'BULL',    cls: 'bullish' },
  bearish: { zh: '看空', en: 'BEAR',    cls: 'bearish' },
  neutral: { zh: '中性', en: 'NEUTRAL', cls: 'neutral' },
  abstain: { zh: '棄權', en: 'ABSTAIN', cls: 'abstain' }
};

function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => { cleanup(); reject(new Error('REQUEST_TIMEOUT')); }, 60000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = Object.entries({ ...params, callback: cb })
      .map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    const script = document.createElement('script');
    script.src = `${url}?${qs}`;
    script.onerror = () => { cleanup(); reject(new Error('NETWORK_ERROR')); };
    document.head.appendChild(script);
  });
}

function $(id) { return document.getElementById(id); }
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function getParam(name) {
  return new URL(window.location.href).searchParams.get(name) || '';
}
function getUserId() {
  return getParam('userId') || getParam('id') || localStorage.getItem('userId') || '';
}
function getSymbol() {
  return (getParam('symbol') || getParam('ticker') || '').toUpperCase();
}
function fmtNum(v, d = 2) {
  if (v == null || isNaN(v)) return '—';
  return Number(v).toFixed(d);
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}

function updateClock() {
  const d = new Date();
  const t = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} TW`;
  $('clock').textContent = t;
}
setInterval(updateClock, 1000);
updateClock();

function renderQuickTags() {
  $('quickTags').innerHTML = QUICK_LIST.map(q =>
    `<button class="quick-tag" onclick="pickQuick('${q.sym}')">${esc(q.label)}</button>`
  ).join(' ');
}
function pickQuick(sym) {
  $('symbolInput').value = sym;
  runAnalysis();
}

async function runAnalysis() {
  const sym = ($('symbolInput').value || '').trim().toUpperCase();
  const userId = getUserId();

  if (!sym) {
    alert('請輸入股票代號');
    return;
  }
  if (!userId) {
    $('userTag').textContent = '未登入';
    $('userTag').className = 'val err';
    setError('未取得 USER ID,請從 dashboard 進入或在 URL 加 ?userId=Uxxx');
    return;
  }
  if (!ALLOWED_SYMBOLS.includes(sym)) {
    setError(`SYMBOL ${esc(sym)} 不在白名單<br><br>目前可查:<br>${ALLOWED_SYMBOLS.join(' / ')}<br><br>新增持股請從 LINE @368ceoiv 上傳券商截圖,系統會自動加入白名單。`);
    return;
  }

  const newUrl = new URL(window.location.href);
  newUrl.searchParams.set('symbol', sym);
  newUrl.searchParams.set('userId', userId);
  history.replaceState(null, '', newUrl);

  $('userTag').textContent = userId.substring(0, 10) + '...';
  $('userTag').className = 'val';
  $('apiStatus').textContent = '分析中';
  $('apiStatus').className = 'val';
  $('analyzeBtn').disabled = true;
  $('analyzeBtn').textContent = '⋯ ANALYZING';
  setLoading(`SCANNING ${sym}`);

  $('crashAlertArea').innerHTML = '';
  $('verdictArea').innerHTML = '';
  $('infoArea').innerHTML = '';
  $('votesArea').innerHTML = '';

  try {
    const data = await jsonp(API_URL, { action: 'analyze', userId, symbol: sym });
    if (!data || data.ok !== true) {
      throw new Error(data && data.error ? data.error : 'API_RETURN_ERROR');
    }
    $('apiStatus').textContent = '成功';
    $('apiStatus').className = 'val ok';

    const v = data.votes || {};
    renderCrash(v);
    renderVerdict(v, sym);
    renderInfo(v);
    renderVotes(v);
    $('stateBox').style.display = 'none';
  } catch (err) {
    $('apiStatus').textContent = '失敗';
    $('apiStatus').className = 'val err';
    setError('ANALYZE FAILED · ' + esc(err.message || String(err)));
  } finally {
    $('analyzeBtn').disabled = false;
    $('analyzeBtn').textContent = 'ANALYZE';
  }
}

function setLoading(msg) {
  const sb = $('stateBox');
  sb.className = 'state-box';
  sb.style.display = 'block';
  sb.innerHTML = `<div class="spinner"></div><div class="msg">${esc(msg)}</div><div class="sub">5 式投票分析中,可能需要 20-40 秒</div>`;
}
function setError(html) {
  const sb = $('stateBox');
  sb.className = 'state-box error';
  sb.style.display = 'block';
  sb.innerHTML = `<div class="msg">! ERROR</div><div class="sub">${html}</div><button class="btn-retry" onclick="runAnalysis()">RETRY</button>`;
}

function renderCrash(v) {
  const c = v.conclusion || {};
  if (!c.alertNote || !c.alertNote.trim()) return;
  $('crashAlertArea').innerHTML = `
    <div class="crash-alert">
      <div class="left">
        <div class="crash-icon"><span>!</span></div>
        <div>CRASH ALERT</div>
        <div class="desc">— ${esc(c.alertNote)}</div>
      </div>
      <div class="risk-badge">RISK</div>
    </div>`;
}

function renderVerdict(v, sym) {
  const c = v.conclusion || {};
  const sig = c.finalSignal || 'insufficient';
  const counts = c.counts || {};
  const total = (counts.bullish||0) + (counts.bearish||0) + (counts.neutral||0) + (counts.abstain||0);

  const netVote = (counts.bullish || 0) - (counts.bearish || 0);
  const netStr = (netVote >= 0 ? '+' : '') + netVote;

  let cls = 'neutral';
  if (sig === 'bullish') cls = 'bullish';
  else if (sig === 'bearish') cls = 'bearish';
  else if (sig === 'insufficient') cls = '';

  const sugg = c.suggestion || '訊號不足';
  const labelMap = { bullish: 'BUY', bearish: 'SELL', neutral: 'HOLD', insufficient: 'WAIT' };
  const enLbl = labelMap[sig] || 'HOLD';
  const zhLbl = { bullish: '加碼', bearish: '減碼', neutral: '持有觀望', insufficient: '等待' }[sig] || '持有觀望';

  const tot = total || 1;
  const pBull = (counts.bullish || 0) / tot * 100;
  const pBear = (counts.bearish || 0) / tot * 100;
  const pNeut = (counts.neutral || 0) / tot * 100;
  const pAbs  = (counts.abstain || 0) / tot * 100;

  $('verdictArea').innerHTML = `
    <div class="section-h">FINAL VERDICT</div>
    <div class="verdict-panel">
      <div class="verdict-main">
        <div class="vote-circle ${cls}">
          <div class="vote-num">${esc(netStr)}</div>
          <div class="vote-lbl">VOTES</div>
        </div>
        <div class="verdict-info">
          <div class="verdict-action ${cls}">${enLbl}<span class="zh">${esc(zhLbl)}</span></div>
          <div class="verdict-bar">
            <div class="bar-bull" style="width:${pBull.toFixed(2)}%"></div>
            <div class="bar-neut" style="width:${pNeut.toFixed(2)}%"></div>
            <div class="bar-bear" style="width:${pBear.toFixed(2)}%"></div>
            <div class="bar-abs"  style="width:${pAbs.toFixed(2)}%"></div>
          </div>
          <div class="verdict-counts">
            <span>多 <span class="n-bull">${counts.bullish||0}</span></span>
            <span>空 <span class="n-bear">${counts.bearish||0}</span></span>
            <span>中 <span class="n-neut">${counts.neutral||0}</span></span>
            <span>棄權 <span class="n-abs">${counts.abstain||0}</span></span>
          </div>
        </div>
      </div>
      <div class="suggestion-box">
        <div class="lbl">SUGGESTION · 操作建議</div>
        <div class="text">${esc(sugg)}</div>
        ${c.confidence != null ? `<div class="meta">CONFIDENCE ${fmtNum(c.confidence, 2)} · RATIO ${fmtNum(c.ratio, 2)}</div>` : ''}
      </div>
    </div>`;
}

function renderInfo(v) {
  const hp = v.holdingPeriod || {};
  const ld = v.leverageDecay || {};
  const items = [];

  if (hp.label) {
    const color = hp.color || '#6B7A9F';
    const lock = hp.locked ? ' <span style="color:var(--neon-cyan);font-size:10px;letter-spacing:2px;">[LOCKED]</span>' : '';
    const warn = hp.isUnclassified ? '<div style="color:var(--neon-yellow);font-size:11px;margin-top:6px;letter-spacing:1px;">⚠ UNCLASSIFIED · 系統用預設規則</div>' : '';
    items.push(`<div class="info-chip" style="border-left-color:${color}">
      <div class="ck">HOLDING PERIOD${lock}</div>
      <div class="cv" style="color:${color}">${esc(hp.label)}</div>
      <div class="cs">${esc(hp.reason || '—')}</div>
      ${warn}
    </div>`);
  }

  if (ld.ok) {
    if (ld.isLeveraged) {
      const color = ld.decayColor || '#FFD93D';
      const levelMap = { mild: 'MILD · 輕微', warn: 'WARN · 警戒', severe: 'SEVERE · 嚴重' };
      items.push(`<div class="info-chip" style="border-left-color:${color}">
        <div class="ck">LEVERAGE DECAY · ${ld.days || 90}D</div>
        <div class="cv" style="color:${color}">${ld.decayPct != null ? fmtNum(ld.decayPct, 2) + '%' : '—'} · ${levelMap[ld.decayLevel] || '—'}</div>
        <div class="cs">標的 ${esc(ld.underlying || '?')}${ld.underlyingName ? ' · ' + esc(ld.underlyingName) : ''} · ${ld.multiplier || '?'}x<br>
        理論 ${fmtPct((ld.theoreticalReturn || 0) * 100)} → 實際 ${fmtPct((ld.actualReturn || 0) * 100)}</div>
      </div>`);
    } else {
      items.push(`<div class="info-chip">
        <div class="ck">LEVERAGE DECAY</div>
        <div class="cv" style="color:var(--text-dim)">N/A</div>
        <div class="cs">${esc(ld.note || '非槓桿 ETF')}</div>
      </div>`);
    }
  }

  $('infoArea').innerHTML = items.length ? `<div class="info-grid">${items.join('')}</div>` : '';
}

function renderVotes(v) {
  let html = '<div class="section-h">5 STRATEGIES VOTING</div>';
  ORDER.forEach(key => {
    const data = v[key];
    const meta = FORMULA[key];
    if (!data) {
      html += `<div class="vote-card abstain">
        <div class="vote-card-h">
          <div><span class="vc-num">${meta.num}</span><span class="vc-name">${meta.zh}<span class="en">${meta.en}</span></span></div>
          <span class="vc-badge abstain">N/A</span>
        </div>
        <div class="vc-sub">${meta.sub}</div>
        <div class="vc-note">後端未回傳此式資料</div>
      </div>`;
      return;
    }
    const vote = data.vote || 'abstain';
    const lbl = VOTE_LBL[vote] || VOTE_LBL.abstain;
    const conf = data.conf != null ? `<span class="vc-conf">CONF ${fmtNum(data.conf, 2)}</span>` : '';
    const isCandy = key === 'candy';

    html += `<div class="vote-card ${lbl.cls}">
      <div class="vote-card-h">
        <div>
          <span class="vc-num">${meta.num}</span>
          <span class="vc-name">${meta.zh}<span class="en">${meta.en}</span></span>
        </div>
        <div>
          <span class="vc-badge ${lbl.cls}">${lbl.en}<span class="zh">${lbl.zh}</span></span>${conf}
        </div>
      </div>
      <div class="vc-sub">${meta.sub}</div>
      ${data.note ? `<div class="vc-note">${esc(data.note)}</div>` : ''}
      ${renderRaw(key, data.raw)}
      ${isCandy ? `<div class="vc-toggle" onclick="toggleSub('candySub')">▾ EXPAND 7 SUB-FORMULAS</div>
        <div class="sub-list" id="candySub">${renderSub(data)}</div>` : ''}
    </div>`;
  });
  $('votesArea').innerHTML = html;
}

function renderRaw(key, raw) {
  if (!raw || typeof raw !== 'object') return '';
  const items = [];
  if (key === 'premium') {
    if (raw.pct != null) items.push(`PCT ${fmtPct(raw.pct)}`);
    if (raw.session) items.push(`SESSION ${esc(raw.session)}`);
    if (raw.source) items.push(`SRC ${esc(raw.source)}`);
  } else if (key === 'whale') {
    if (raw.vol != null && raw.avgVol != null) {
      items.push(`VOL ${Number(raw.vol).toLocaleString()}`);
      items.push(`AVG ${Number(raw.avgVol).toLocaleString()}`);
      items.push(`RATIO ${fmtNum(raw.vol/raw.avgVol, 2)}x`);
    }
    if (raw.whaleStr) items.push(`STR ${esc(raw.whaleStr)}`);
  } else if (key === 'crash') {
    if (raw.pct != null) items.push(`PCT ${fmtPct(raw.pct)}`);
    if (raw.alert) items.push(`ALERT ${esc(raw.alert)}`);
    if (raw.rsi != null) items.push(`RSI ${fmtNum(raw.rsi, 1)}`);
  } else if (key === 'jiansrc') {
    if (raw.bullScore != null) items.push(`BULL ${fmtNum(raw.bullScore, 2)}`);
    if (raw.bearScore != null) items.push(`BEAR ${fmtNum(raw.bearScore, 2)}`);
    if (raw.netScore != null) items.push(`NET ${fmtNum(raw.netScore, 2)}`);
  }
  let html = items.length ? `<div class="vc-raw">${items.join(' · ')}</div>` : '';
  if (key === 'jiansrc' && raw.reasons) {
    const bull = (raw.reasons.bullish || []).map(r => `<span class="r-tag bull">+ ${esc(r)}</span>`).join('');
    const bear = (raw.reasons.bearish || []).map(r => `<span class="r-tag bear">− ${esc(r)}</span>`).join('');
    if (bull || bear) html += `<div class="reason-tags">${bull}${bear}</div>`;
  }
  return html;
}

function renderSub(candy) {
  const raw = candy.raw || {};
  const sub = raw.sub || {};
  const items = Object.entries(SUB_LBL).map(([k, lbl]) => {
    const val = sub[k];
    if (val == null) {
      return `<div class="sub-item"><span class="sub-name">${lbl}</span><span class="sub-val abstain">N/A</span></div>`;
    }
    const vote = typeof val === 'string' ? val : (val.vote || 'abstain');
    const conf = typeof val === 'object' ? val.conf : null;
    const lblObj = VOTE_LBL[vote] || VOTE_LBL.abstain;
    return `<div class="sub-item">
      <span class="sub-name">${lbl}</span>
      <span class="sub-val ${lblObj.cls}">${lblObj.en}${conf != null ? ' (' + fmtNum(conf, 2) + ')' : ''}</span>
    </div>`;
  }).join('');
  const score = raw.score != null ? `<div style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--neon-cyan);margin-bottom:8px;">CANDY SCORE · ${fmtNum(raw.score, 2)}</div>` : '';
  return score + items;
}

function toggleSub(id) {
  const el = $(id);
  if (!el) return;
  el.classList.toggle('show');
  const t = el.previousElementSibling;
  if (t && t.classList.contains('vc-toggle')) {
    t.textContent = el.classList.contains('show') ? '▴ COLLAPSE' : '▾ EXPAND 7 SUB-FORMULAS';
  }
}

// v6.2 新增 / v6.3 修正:打 dashboard API 拿用戶持股,動態組 Quick 跟白名單
async function loadUserHoldings(userId) {
  try {
    const data = await jsonp(API_URL, { action: 'dashboard', userId });
    if (data && data.ok === true && Array.isArray(data.holdings)) {
      const myStocks = data.holdings.filter(h => h.ticker).map(h => ({
        sym: h.ticker,
        label: `${h.ticker} ${(h.shares || 0).toLocaleString()}股`
      }));
      // Quick:用戶持股放前面 + VIX 純指標
      QUICK_LIST = [
        ...myStocks,
        { sym: 'VIX', label: 'VIX 恐慌指數' }
      ];
      // 白名單:用戶持股 + VIX
      ALLOWED_SYMBOLS = [
        ...myStocks.map(s => s.sym),
        ...MARKET_SYMBOLS
      ];
      renderQuickTags(); // 重畫
    }
  } catch (e) {
    console.warn('[12steps] 無法載入持股,Quick 使用預設指標', e);
  }
}

function init() {
  renderQuickTags();
  const userId = getUserId();
  if (userId) {
    $('userTag').textContent = userId.substring(0, 10) + '...';
    localStorage.setItem('userId', userId);
    // v6.2:背景載入用戶持股,不擋主流程
    loadUserHoldings(userId);
  } else {
    $('userTag').textContent = '未登入';
    $('userTag').className = 'val err';
  }

  const sym = getSymbol();
  if (sym) {
    $('symbolInput').value = sym;
    if (userId) runAnalysis();
  }
}
init();
</script>
