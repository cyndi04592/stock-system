<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股神器 · AI 分析</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020A14;--card:#071525;--card2:#0A1E35;
  --gold:#F5A623;--cyan:#00D4FF;--green:#00FF88;
  --red:#FF3366;--orange:#FF6B35;--purple:#A855F7;
  --teal:#00CDB7;
  --white:#E8F4FD;--gray:#4A6580;--lgray:#8BA8C4;
  --border:rgba(0,212,255,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--white); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
.page { max-width:1140px; margin:0 auto; padding:20px; }

.top-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:24px; }
.logo { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:900; color:var(--gold); letter-spacing:2px; }
.logo span { color:var(--cyan); }
.clock { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gray); }
.usage-tag { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cyan); padding:4px 10px; border:1px solid var(--border); border-radius:6px; }

.input-section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:16px; }
.input-row { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
.input-group { display:flex; flex-direction:column; gap:6px; }
.input-label { font-size:10px; color:var(--gray); font-family:'JetBrains Mono',monospace; letter-spacing:1px; text-transform:uppercase; }
.stock-input { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--white); font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; width:155px; letter-spacing:2px; transition:border-color 0.2s; }
.stock-input:focus { outline:none; border-color:var(--cyan); }
.market-select { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--white); font-family:'JetBrains Mono',monospace; font-size:12px; cursor:pointer; }
.market-select:focus { outline:none; border-color:var(--cyan); }
.analyze-btn { padding:10px 24px; background:var(--cyan); border:none; border-radius:8px; color:#020A14; font-weight:900; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:'Orbitron',sans-serif; letter-spacing:1px; white-space:nowrap; }
.analyze-btn:hover { opacity:0.85; transform:translateY(-1px); }
.analyze-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

.quick-row { display:flex; gap:7px; flex-wrap:wrap; margin-top:14px; align-items:center; }
.quick-label { font-size:10px; color:var(--gray); font-family:'JetBrains Mono',monospace; letter-spacing:1px; }
.quick-tag { padding:4px 11px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--lgray); font-size:10px; cursor:pointer; transition:all 0.2s; font-family:'JetBrains Mono',monospace; }
.quick-tag:hover { color:var(--white); border-color:rgba(255,255,255,0.25); }
.quick-tag.tw { border-color:rgba(245,166,35,0.3); color:#C8A060; }
.quick-tag.tw:hover { color:var(--gold); border-color:var(--gold); }

/* 結論卡 */
.conclusion-panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; margin-bottom:20px; display:none; }
.conclusion-panel.show { display:block; }
.conclusion-layout { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
.signal-circle { width:84px; height:84px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; border:3px solid var(--border); flex-shrink:0; transition:border-color 0.5s; }
.signal-emoji { font-size:32px; line-height:1; }
.signal-info { flex:1; min-width:200px; }
.signal-label { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; margin-bottom:8px; letter-spacing:1px; }
.signal-bar-outer { height:6px; background:rgba(255,255,255,0.05); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.signal-bar-inner { height:100%; border-radius:3px; transition:width 0.8s ease; }
.signal-detail { font-size:11px; color:var(--gray); font-family:'JetBrains Mono',monospace; }

.suggestion-box { margin-top:16px; padding:14px 18px; border-radius:10px; font-size:13px; line-height:1.8; border-left:3px solid; }
.sb-bullish { background:rgba(0,255,136,0.06); border-color:var(--green); color:#60C890; }
.sb-bearish { background:rgba(255,51,102,0.06); border-color:var(--red); color:#C85070; }
.sb-neutral { background:rgba(0,212,255,0.06); border-color:var(--cyan); color:#60A8C8; }
.sb-insufficient { background:rgba(74,101,128,0.1); border-color:var(--gray); color:var(--lgray); }
.sb-title { font-weight:700; margin-bottom:6px; font-family:'JetBrains Mono',monospace; letter-spacing:1px; font-size:11px; }
.alert-line { margin-top:8px; padding:8px 12px; background:rgba(255,107,53,0.1); border-left:3px solid var(--orange); color:#C87040; font-size:12px; border-radius:4px; }

.holding-meta { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.meta-tag { padding:6px 12px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:6px; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--lgray); }
.meta-tag.locked { border-color:var(--gold); color:var(--gold); }
.meta-tag.leveraged { border-color:var(--orange); color:var(--orange); }

/* 6 式卡片 */
.section-title { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--gold); letter-spacing:3px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

.votes-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.vote-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:transform 0.2s,border-color 0.2s; position:relative; animation:fadeUp 0.35s ease both; }
.vote-card:hover { transform:translateY(-2px); border-color:rgba(0,212,255,0.25); }
.vote-card.v-bullish { border-color:rgba(0,255,136,0.35); background:rgba(0,255,136,0.04); }
.vote-card.v-bearish { border-color:rgba(255,51,102,0.35); background:rgba(255,51,102,0.04); }
.vote-card.v-neutral { border-color:rgba(0,212,255,0.25); background:rgba(0,212,255,0.04); }
.vote-card.v-abstain { opacity:0.45; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

.vote-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.vote-badge { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:900; flex-shrink:0; border:1px solid var(--border); background:var(--card2); color:var(--gray); }
.vote-card.v-bullish .vote-badge { background:rgba(0,255,136,0.15); color:var(--green); border-color:rgba(0,255,136,0.3); }
.vote-card.v-bearish .vote-badge { background:rgba(255,51,102,0.15); color:var(--red); border-color:rgba(255,51,102,0.3); }
.vote-card.v-neutral .vote-badge { background:rgba(0,212,255,0.15); color:var(--cyan); border-color:rgba(0,212,255,0.3); }

.vote-title { font-size:12px; font-weight:700; color:var(--white); line-height:1.3; }
.vote-source { font-size:9px; color:var(--gray); font-family:'JetBrains Mono',monospace; margin-top:2px; }
.vote-status { position:absolute; top:12px; right:12px; font-size:9px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:1px; }
.vote-card.v-bullish .vote-status { color:var(--green); }
.vote-card.v-bearish .vote-status { color:var(--red); }
.vote-card.v-neutral .vote-status { color:var(--cyan); }
.vote-card.v-abstain .vote-status { color:var(--gray); }

.vote-note { font-size:11px; color:var(--gray); line-height:1.5; margin-top:4px; min-height:30px; word-break:break-all; }
.vote-card.v-bullish .vote-note { color:#60B890; }
.vote-card.v-bearish .vote-note { color:#C85070; }
.vote-card.v-neutral .vote-note { color:#60A8C8; }

.vote-conf { display:flex; align-items:center; gap:6px; margin-top:7px; }
.vote-conf-bar { flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.vote-conf-bar-inner { height:100%; transition:width 0.6s ease; }
.vote-card.v-bullish .vote-conf-bar-inner { background:var(--green); }
.vote-card.v-bearish .vote-conf-bar-inner { background:var(--red); }
.vote-card.v-neutral .vote-conf-bar-inner { background:var(--cyan); }
.vote-conf-text { font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--gray); }

/* 支撐位面板 */
.support-panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:none; }
.support-panel.show { display:block; }
.support-list { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
.support-row { display:flex; align-items:center; gap:12px; padding:8px 12px; background:rgba(0,0,0,0.25); border-radius:8px; font-size:12px; }
.support-emoji { font-size:14px; }
.support-rank { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gold); letter-spacing:1px; min-width:60px; }
.support-price { font-family:'Orbitron',sans-serif; font-weight:700; color:var(--white); min-width:80px; }
.support-distance { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gray); min-width:55px; }
.support-note { color:var(--lgray); font-size:11px; flex:1; }

/* 槓桿耗損面板 */
.decay-panel { background:rgba(255,107,53,0.05); border:1px solid rgba(255,107,53,0.2); border-radius:12px; padding:14px 18px; margin-bottom:20px; display:none; font-size:12px; line-height:1.7; color:#C87040; }
.decay-panel.show { display:block; }
.decay-title { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--orange); letter-spacing:1px; margin-bottom:6px; }

/* 錯誤狀態 */
.error-panel { background:rgba(255,51,102,0.06); border:1px solid rgba(255,51,102,0.3); border-radius:12px; padding:20px 24px; text-align:center; display:none; }
.error-panel.show { display:block; }
.error-emoji { font-size:32px; margin-bottom:10px; }
.error-title { font-size:14px; font-weight:700; color:var(--red); margin-bottom:6px; }
.error-msg { font-size:12px; color:var(--lgray); line-height:1.7; }

/* Loading */
.loading { text-align:center; padding:48px; display:none; }
.loading.show { display:block; }
.loading-text { font-family:'Orbitron',sans-serif; font-size:12px; color:var(--cyan); letter-spacing:2px; animation:blink 1s infinite; }
@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.3 } }

@media (max-width:780px) { .votes-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:480px) { .votes-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="logo">STOCK <span>AI 分析</span></div>
  <div style="display:flex; gap:12px; align-items:center;">
    <div class="usage-tag" id="usageTag">--</div>
    <div class="clock" id="clock">--:--:--  TW</div>
  </div>
</div>

<!-- 輸入 -->
<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <div class="input-label">股票代號</div>
      <input class="stock-input" id="tickerInput" placeholder="ORCL" value="ORCL" onkeydown="if(event.key==='Enter')analyze()">
    </div>
    <div class="input-group">
      <div class="input-label">市場</div>
      <select class="market-select" id="marketSelect">
        <option value="US">美股 US</option>
        <option value="TW">台股 TW</option>
      </select>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">ANALYZE</button>
  </div>
  <div class="quick-row">
    <span class="quick-label">QUICK :</span>
    <button class="quick-tag" onclick="quickStock('ORCL','US')">ORCL 甲骨文</button>
    <button class="quick-tag" onclick="quickStock('ORCX','US')">ORCX</button>
    <button class="quick-tag" onclick="quickStock('SMR','US')">SMR 核電</button>
    <button class="quick-tag" onclick="quickStock('SMUP','US')">SMUP</button>
    <button class="quick-tag" onclick="quickStock('NVDA','US')">NVDA 輝達</button>
    <button class="quick-tag" onclick="quickStock('TSM','US')">TSM 台積電 ADR</button>
    <button class="quick-tag tw" onclick="quickStock('0050','TW')">TW 0050</button>
    <button class="quick-tag tw" onclick="quickStock('00631L','TW')">TW 00631L</button>
    <button class="quick-tag tw" onclick="quickStock('2330','TW')">TW 2330</button>
  </div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-text">ANALYZING ...</div>
</div>

<!-- 錯誤 -->
<div class="error-panel" id="errorPanel">
  <div class="error-emoji">⚠️</div>
  <div class="error-title" id="errorTitle">分析失敗</div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- 主體 -->
<div id="resultArea" style="display:none">

  <!-- 結論卡 -->
  <div class="conclusion-panel show" id="conclusionPanel">
    <div class="section-title">AI 交叉驗證結論</div>
    <div class="conclusion-layout">
      <div class="signal-circle" id="signalCircle">
        <div class="signal-emoji" id="signalEmoji">⚪</div>
      </div>
      <div class="signal-info">
        <div class="signal-label" id="signalLabel">分析中</div>
        <div class="signal-bar-outer"><div class="signal-bar-inner" id="signalBar" style="width:0%"></div></div>
        <div class="signal-detail" id="signalDetail">--</div>
      </div>
    </div>
    <div class="suggestion-box sb-neutral" id="suggestionBox">
      <div class="sb-title">建議操作</div>分析中...
    </div>
    <div class="holding-meta" id="holdingMeta"></div>
  </div>

  <!-- 槓桿耗損 -->
  <div class="decay-panel" id="decayPanel">
    <div class="decay-title">槓桿 ETF 耗損評估</div>
    <div id="decayContent"></div>
  </div>

  <!-- 6 式卡片 -->
  <div class="section-title" id="votesTitle">6 套 AI 神器交叉分析</div>
  <div class="votes-grid" id="votesGrid"></div>

  <!-- 支撐位 -->
  <div class="support-panel" id="supportPanel">
    <div class="section-title">主力支撐位偵測</div>
    <div class="support-list" id="supportList"></div>
  </div>

</div>

</div>

<script>
// ════════════════════════════════════════════════
// v7.0 配置
// ════════════════════════════════════════════════
const GAS_API = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

// 6 式 + 支撐位 顯示順序與標題
const VOTE_DEFS = [
  { key: 'premium',  num: '01', title: '開盤溢價率',  source: '老練股神 / RA 反推' },
  { key: 'candy',    num: '02', title: 'CANDY 戰法',  source: 'CINDY 7 子式 / RA 反推' },
  { key: 'whale',    num: '03', title: '主力鯨魚偵測', source: '量能突破 / 暗池吸出' },
  { key: 'crash',    num: '04', title: '大跌警報',    source: '跌幅 + RSI 交叉' },
  { key: 'jiansrc',  num: '05', title: '題材熱度',    source: '產業 + 過熱偵測' },
  { key: 'substack', num: '06', title: '美股大叔',    source: 'Substack 即時郵件分析' },
];

// 6 式中文標題對應(API 給的 vote 結構不一定有這些 key,但至少 6 個固定)
let userId = '';

// ════════════════════════════════════════════════
// 取 userId(從 URL 參數)
// ════════════════════════════════════════════════
function getUserIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || params.get('userId') || '';
}

// ════════════════════════════════════════════════
// JSONP helper(GAS 不支援 CORS,只能用 JSONP)
// ════════════════════════════════════════════════
function callJsonp(action, params, timeoutMs) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const script = document.createElement('script');
    let timer = null;

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    function cleanup() {
      if (timer) clearTimeout(timer);
      try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    timer = setTimeout(() => {
      cleanup();
      reject(new Error('TIMEOUT'));
    }, timeoutMs || 60000);

    const queryParts = ['action=' + encodeURIComponent(action), 'callback=' + callbackName];
    for (const k in params) {
      if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
        queryParts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
      }
    }
    script.src = GAS_API + '?' + queryParts.join('&');
    script.onerror = () => { cleanup(); reject(new Error('NETWORK_ERROR')); };
    document.body.appendChild(script);
  });
}

// ════════════════════════════════════════════════
// 顯示 / 隱藏狀態
// ════════════════════════════════════════════════
function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', !!show);
}
function showError(title, msg) {
  document.getElementById('errorPanel').classList.add('show');
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorMsg').textContent = msg;
}
function hideError() {
  document.getElementById('errorPanel').classList.remove('show');
}
function showResult() {
  document.getElementById('resultArea').style.display = 'block';
}

// ════════════════════════════════════════════════
// 主流程:打 API
// ════════════════════════════════════════════════
async function analyze() {
  if (!userId) {
    showError('缺少使用者 ID', '請從 LINE Bot 點選分析按鈕進入,網址不能直接打開');
    return;
  }

  const ticker = (document.getElementById('tickerInput').value || '').trim().toUpperCase();
  if (!ticker) {
    showError('代號為空', '請輸入股票代號');
    return;
  }

  hideError();
  showLoading(true);
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;

  try {
    const data = await callJsonp('analyze', {
      id: userId,
      symbol: ticker
    }, 60000);

    showLoading(false);
    document.getElementById('analyzeBtn').disabled = false;

    if (!data || data.ok === false) {
      handleApiError(data);
      return;
    }

    if (!data.votes) {
      showError('回應異常', '後端沒有回傳 votes 結構');
      return;
    }

    renderResult(data);
    showResult();

  } catch(e) {
    showLoading(false);
    document.getElementById('analyzeBtn').disabled = false;
    showError('連線失敗', e.message === 'TIMEOUT' ? '60 秒沒回應,請稍後再試' : '無法連到伺服器:' + e.message);
  }
}

function handleApiError(data) {
  if (!data) {
    showError('無回應', '後端沒回任何資料');
    return;
  }
  const errCode = data.error || '';
  const msg = data.message || '未知錯誤';

  if (errCode === 'NOT_ACTIVE') {
    showError('尚未開通', msg);
  } else if (errCode === 'USER_NOT_FOUND') {
    showError('查無此用戶', msg);
  } else if (errCode === 'DAILY_LIMIT_EXCEEDED') {
    showError('今日查詢已達上限', msg);
    if (data.usage) updateUsageTag(data.usage);
  } else if (errCode === 'TW_NOT_SUPPORTED') {
    showError('台股尚未上線', msg);
  } else {
    showError('分析失敗', msg + (errCode ? ' [' + errCode + ']' : ''));
  }
}

// ════════════════════════════════════════════════
// 渲染結果
// ════════════════════════════════════════════════
function renderResult(data) {
  // 1. 用量徽章
  if (data.usage) updateUsageTag(data.usage);

  // 2. 結論卡
  renderConclusion(data.votes.conclusion, data);

  // 3. 持有期 + 槓桿標籤
  renderHoldingMeta(data.votes.holdingPeriod, data.votes.leverageDecay);

  // 4. 槓桿耗損
  renderDecayPanel(data.votes.leverageDecay);

  // 5. 6 式卡
  renderVotes(data.votes);

  // 6. 支撐位
  renderSupports(data.votes.support);

  // 7. votes 標題動態化(看成功幾式)
  const successCount = countValidVotes(data.votes);
  document.getElementById('votesTitle').textContent =
    successCount + ' 套 AI 神器交叉分析';
}

function updateUsageTag(usage) {
  const el = document.getElementById('usageTag');
  if (!usage) { el.textContent = '--'; return; }
  if (usage.isUnlimited) {
    el.textContent = '今日 ∞';
    el.style.color = 'var(--gold)';
    el.style.borderColor = 'var(--gold)';
  } else {
    el.textContent = '今日剩餘 ' + usage.remaining + '/' + usage.limit;
    el.style.color = usage.remaining <= 3 ? 'var(--orange)' : 'var(--cyan)';
    el.style.borderColor = usage.remaining <= 3 ? 'var(--orange)' : 'var(--border)';
  }
}

function renderConclusion(c, data) {
  if (!c) {
    document.getElementById('signalLabel').textContent = '結論計算失敗';
    document.getElementById('signalDetail').textContent = '--';
    return;
  }

  // emoji + 顏色
  document.getElementById('signalEmoji').textContent = c.signalEmoji || '⚪';
  document.getElementById('signalLabel').textContent = c.signalLabel || '訊號不足';

  let color, sbClass;
  if (c.finalSignal === 'bullish') { color = 'var(--green)'; sbClass = 'sb-bullish'; }
  else if (c.finalSignal === 'bearish') { color = 'var(--red)'; sbClass = 'sb-bearish'; }
  else if (c.finalSignal === 'neutral') { color = 'var(--cyan)'; sbClass = 'sb-neutral'; }
  else { color = 'var(--gray)'; sbClass = 'sb-insufficient'; }

  document.getElementById('signalCircle').style.borderColor = color;
  document.getElementById('signalLabel').style.color = color;

  // 信心 bar
  const conf = (typeof c.confidence === 'number') ? c.confidence : 0;
  const bar = document.getElementById('signalBar');
  setTimeout(() => { bar.style.width = (conf * 100) + '%'; bar.style.background = color; }, 50);

  // 細節
  const counts = c.counts || {};
  const detail = '看多 ' + (counts.bullish || 0) +
                 ' · 看空 ' + (counts.bearish || 0) +
                 ' · 中性 ' + (counts.neutral || 0) +
                 ' · 棄權 ' + (counts.abstain || 0) +
                 '   |   權重 ' + (c.bullishWeight || 0) + ' vs ' + (c.bearishWeight || 0);
  document.getElementById('signalDetail').textContent = detail;

  // 建議框
  const sb = document.getElementById('suggestionBox');
  sb.className = 'suggestion-box ' + sbClass;
  let html = '<div class="sb-title">建議操作</div>' + escapeHtml(c.suggestion || '--');
  if (c.alertNote) {
    html += '<div class="alert-line">' + escapeHtml(c.alertNote) + '</div>';
  }
  sb.innerHTML = html;
}

function renderHoldingMeta(holdingPeriod, leverageDecay) {
  const wrap = document.getElementById('holdingMeta');
  wrap.innerHTML = '';

  if (holdingPeriod && holdingPeriod.label) {
    const tag = document.createElement('div');
    tag.className = 'meta-tag' + (holdingPeriod.locked ? ' locked' : '');
    tag.textContent = '📅 ' + holdingPeriod.label + (holdingPeriod.locked ? ' (鎖定)' : '');
    if (holdingPeriod.color) tag.style.color = holdingPeriod.color;
    wrap.appendChild(tag);
  }

  if (leverageDecay && leverageDecay.ok && leverageDecay.isLeveraged) {
    const tag = document.createElement('div');
    tag.className = 'meta-tag leveraged';
    const mult = leverageDecay.leverage || leverageDecay.multiplier || '?';
    const target = leverageDecay.targetTicker || leverageDecay.target || '?';
    tag.textContent = '⚡ 槓桿 ' + mult + 'x · 標的 ' + target;
    wrap.appendChild(tag);
  }
}

function renderDecayPanel(decay) {
  const panel = document.getElementById('decayPanel');
  const content = document.getElementById('decayContent');
  if (!decay || !decay.ok || !decay.isLeveraged) {
    panel.classList.remove('show');
    return;
  }

  let html = '';
  if (decay.decayPct !== undefined) {
    html += '近 30 日槓桿耗損約 <strong>' + decay.decayPct + '%</strong>';
  }
  if (decay.decayLevel) {
    html += '(等級:' + decay.decayLevel + ')';
  }
  if (decay.note) {
    html += '<br>' + escapeHtml(decay.note);
  }
  if (decay.targetReturn !== undefined && decay.actualReturn !== undefined) {
    html += '<br>標的報酬 ' + decay.targetReturn + '% · 實際 ' + decay.actualReturn + '%';
  }
  if (!html) html = '槓桿 ETF 已偵測,但耗損數據不足';

  content.innerHTML = html;
  panel.classList.add('show');
}

function countValidVotes(votes) {
  let n = 0;
  for (const def of VOTE_DEFS) {
    const v = votes[def.key];
    if (v && v.vote && v.vote !== 'abstain') n++;
  }
  return n;
}

function renderVotes(votes) {
  const grid = document.getElementById('votesGrid');
  grid.innerHTML = '';

  VOTE_DEFS.forEach((def, i) => {
    const v = votes[def.key];
    const card = document.createElement('div');
    let voteValue = (v && v.vote) ? v.vote : 'abstain';
    if (!['bullish','bearish','neutral','abstain'].includes(voteValue)) voteValue = 'abstain';

    card.className = 'vote-card v-' + voteValue;
    card.style.animationDelay = (i * 0.04) + 's';

    const stLabel = {
      bullish: '看多',
      bearish: '看空',
      neutral: '中性',
      abstain: '棄權'
    }[voteValue] || '--';

    const conf = (v && typeof v.conf === 'number') ? v.conf : 0;
    const note = (v && v.note) ? v.note : '無資料';

    card.innerHTML =
      '<div class="vote-status">' + stLabel + '</div>' +
      '<div class="vote-header">' +
        '<div class="vote-badge">' + def.num + '</div>' +
        '<div>' +
          '<div class="vote-title">' + escapeHtml(def.title) + '</div>' +
          '<div class="vote-source">' + escapeHtml(def.source) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="vote-note">' + escapeHtml(note) + '</div>' +
      '<div class="vote-conf">' +
        '<div class="vote-conf-bar"><div class="vote-conf-bar-inner" style="width:' + (conf * 100) + '%"></div></div>' +
        '<div class="vote-conf-text">信心 ' + (conf * 100).toFixed(0) + '%</div>' +
      '</div>';

    // 點擊看 raw
    card.onclick = () => {
      let detailMsg = '【' + def.title + '】\n\n';
      detailMsg += '判斷:' + stLabel + '\n';
      detailMsg += '信心:' + (conf * 100).toFixed(0) + '%\n\n';
      detailMsg += '說明:' + note;
      if (v && v.raw) {
        try {
          detailMsg += '\n\n原始資料:\n' + JSON.stringify(v.raw, null, 2);
        } catch(e) {}
      }
      alert(detailMsg);
    };

    grid.appendChild(card);
  });
}

function renderSupports(support) {
  const panel = document.getElementById('supportPanel');
  const list = document.getElementById('supportList');

  if (!support || !support.raw || !support.raw.supports || support.raw.supports.length === 0) {
    panel.classList.remove('show');
    return;
  }

  list.innerHTML = '';
  const supports = support.raw.supports;
  supports.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'support-row';
    const rankLabel = ['第一道', '第二道', '第三道'][i] || ('第' + (i+1) + '道');
    row.innerHTML =
      '<div class="support-emoji">🛡️</div>' +
      '<div class="support-rank">' + rankLabel + '</div>' +
      '<div class="support-price">$' + s.price + '</div>' +
      '<div class="support-distance">距離 ' + s.distance + '%</div>' +
      '<div class="support-note">' + escapeHtml(s.note || '') + '</div>';
    list.appendChild(row);
  });

  panel.classList.add('show');
}

// ════════════════════════════════════════════════
// 工具
// ════════════════════════════════════════════════
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function quickStock(ticker, market) {
  document.getElementById('tickerInput').value = ticker;
  document.getElementById('marketSelect').value = market;
  analyze();
}

function updateClock() {
  const now = new Date();
  const tw = new Date(now.getTime() + (8 * 60 + now.getTimezoneOffset()) * 60000);
  document.getElementById('clock').textContent = tw.toTimeString().slice(0, 8) + '  TW';
}

// 載入用量
async function loadUsage() {
  if (!userId) return;
  try {
    const data = await callJsonp('usage', { id: userId }, 15000);
    if (data && data.ok) updateUsageTag(data);
  } catch(e) {
    // 用量抓不到不影響主功能
    console.warn('usage load failed:', e.message);
  }
}

// ════════════════════════════════════════════════
// 啟動
// ════════════════════════════════════════════════
window.onload = function() {
  userId = getUserIdFromUrl();
  updateClock();
  setInterval(updateClock, 1000);

  if (!userId) {
    showError('缺少使用者 ID', '請從 LINE Bot 點選分析按鈕進入,網址必須帶 ?id=Uxxxx');
    document.getElementById('analyzeBtn').disabled = true;
    return;
  }

  loadUsage();

  // 預設不自動 analyze,等用戶按按鈕(避免 active 用戶白白消耗一次查詢額度)
};
</script>
