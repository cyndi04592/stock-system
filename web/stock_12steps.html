<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>美股神器 - 五式投票分析</title>

<!-- 字體 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:    #0A1E35;
  --bg-card:    #14283F;
  --bg-card-2:  #1A3050;
  --line:       #243B5C;
  --gold:       #F5A623;
  --gold-soft:  #FFD178;
  --text-main:  #E8EEF5;
  --text-mute:  #8FA4BC;
  --text-faint: #5A7090;
  --bull:       #00C896;
  --bear:       #FF4D5E;
  --neutral:    #8FA4BC;
  --abstain:    #5A7090;
  --alert:      #FF8800;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: "Noto Sans TC", -apple-system, "PingFang TC", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
}

.mono { font-family: "JetBrains Mono", monospace; font-feature-settings: "tnum"; }

/* ───── 頂部 header ───── */
.header {
  background: linear-gradient(180deg, #0F2440 0%, var(--bg-deep) 100%);
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}
.header .back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text-mute);
  text-decoration: none;
  font-size: 18px;
  cursor: pointer;
  background: var(--bg-card);
}
.header .back:hover { color: var(--gold); border-color: var(--gold); }
.header .title { font-size: 14px; color: var(--text-mute); letter-spacing: 0.06em; }
.header .ticker {
  font-family: "JetBrains Mono", monospace;
  font-size: 24px; font-weight: 700;
  color: var(--gold);
  margin-top: 2px;
}

/* ───── 容器 ───── */
.container { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }

/* ───── 載入狀態 ───── */
.loading {
  text-align: center; padding: 60px 20px; color: var(--text-mute);
}
.loading::after {
  content: "";
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--line);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ───── 大跌警報橫條 ───── */
.alert-bar {
  background: linear-gradient(90deg, var(--alert) 0%, #FF6B00 100%);
  color: #FFF;
  padding: 12px 16px;
  border-radius: 10px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  font-size: 15px;
  box-shadow: 0 4px 14px rgba(255,107,0,0.3);
}
.alert-bar .icon { font-size: 22px; }

/* ───── 主結論卡(超大字) ───── */
.conclusion {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px 22px;
  margin-bottom: 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.conclusion::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(245,166,35,0.08), transparent 60%);
  pointer-events: none;
}
.conclusion .label {
  font-size: 13px; color: var(--text-mute);
  letter-spacing: 0.2em; margin-bottom: 8px;
}
.conclusion .action-icon {
  font-size: 56px; line-height: 1; margin-bottom: 8px;
}
.conclusion .action-text {
  font-size: 36px; font-weight: 900;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.conclusion .action-desc {
  font-size: 15px; color: var(--text-mute);
  max-width: 360px; margin: 0 auto;
  line-height: 1.6;
}

.conclusion.bull .action-text { color: var(--bull); }
.conclusion.bear .action-text { color: var(--bear); }
.conclusion.hold .action-text { color: var(--gold); }

/* ───── 票數摘要 ───── */
.tally {
  display: flex; gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
  justify-content: space-between;
  align-items: center;
}
.tally-cell { flex: 1; text-align: center; }
.tally-cell .num {
  font-family: "JetBrains Mono", monospace;
  font-size: 22px; font-weight: 700;
  line-height: 1;
}
.tally-cell .lbl {
  font-size: 11px; color: var(--text-faint);
  margin-top: 4px; letter-spacing: 0.1em;
}
.tally-cell.b .num { color: var(--bull); }
.tally-cell.n .num { color: var(--neutral); }
.tally-cell.r .num { color: var(--bear); }
.tally-cell.a .num { color: var(--abstain); }
.tally-divider { width: 1px; background: var(--line); align-self: stretch; }

/* ───── 五式區塊標題 ───── */
.section-title {
  font-size: 13px; color: var(--text-mute);
  letter-spacing: 0.2em;
  margin: 22px 4px 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ""; display: inline-block;
  width: 16px; height: 2px;
  background: var(--gold);
}

/* ───── 招式卡 ───── */
.move-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.move-card.bull   { border-left: 3px solid var(--bull); }
.move-card.bear   { border-left: 3px solid var(--bear); }
.move-card.neutral { border-left: 3px solid var(--neutral); }
.move-card.abstain { border-left: 3px solid var(--abstain); }

.move-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.move-header:hover { background: var(--bg-card-2); }

.move-num {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; color: var(--text-faint);
  letter-spacing: 0.1em;
  min-width: 26px;
}
.move-name {
  flex: 1;
  font-size: 15px; font-weight: 500;
}
.move-vote {
  font-family: "JetBrains Mono", monospace;
  font-size: 13px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
}
.move-vote.bull   { color: var(--bull);    background: rgba(0,200,150,0.1); }
.move-vote.bear   { color: var(--bear);    background: rgba(255,77,94,0.1); }
.move-vote.neutral { color: var(--neutral); background: rgba(143,164,188,0.1); }
.move-vote.abstain { color: var(--abstain); background: rgba(90,112,144,0.1); }

.move-toggle {
  color: var(--text-faint); font-size: 14px;
  transition: transform 0.2s;
  margin-left: 4px;
}
.move-card.open .move-toggle { transform: rotate(180deg); }

.move-detail {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--line);
  margin-top: -1px;
  padding-top: 14px;
}
.move-card.open .move-detail { display: block; }

.detail-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 6px 0;
  font-size: 14px;
}
.detail-row .k { color: var(--text-mute); flex-shrink: 0; min-width: 70px; }
.detail-row .v {
  color: var(--text-main); text-align: right;
  font-family: "JetBrains Mono", monospace;
}
.detail-row .v.note {
  font-family: "Noto Sans TC", sans-serif;
  color: var(--text-main); line-height: 1.6;
}

/* 信心條 */
.conf-bar {
  height: 6px; background: var(--bg-deep);
  border-radius: 3px; overflow: hidden;
  margin-top: 4px; flex: 1; max-width: 120px;
}
.conf-bar > span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-soft));
  border-radius: 3px;
}

.detail-section-title {
  font-size: 12px;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  margin: 14px 0 6px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
}

/* CANDY 7 子式 */
.sub-list { display: grid; gap: 6px; }
.sub-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  background: var(--bg-deep);
  border-radius: 6px;
  font-size: 13px;
}
.sub-item .sub-name { color: var(--text-main); }
.sub-item .sub-score {
  font-family: "JetBrains Mono", monospace;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}
.sub-item .sub-score.pos { color: var(--bull); background: rgba(0,200,150,0.1); }
.sub-item .sub-score.neg { color: var(--bear); background: rgba(255,77,94,0.1); }
.sub-item .sub-score.zero { color: var(--neutral); background: rgba(143,164,188,0.1); }
.sub-item .sub-score.null { color: var(--abstain); background: rgba(90,112,144,0.1); }
.sub-item .sub-note {
  font-size: 11px; color: var(--text-faint);
  margin-top: 2px;
}
.sub-item-row { flex: 1; }

/* 規則說明區 */
.rule-box {
  background: rgba(245,166,35,0.06);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 10px;
  font-size: 13px;
  color: var(--gold-soft);
  line-height: 1.7;
}
.rule-box .rule-label {
  display: inline-block;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
  font-weight: 700;
}

/* 錯誤區 */
.error-box {
  background: rgba(255,77,94,0.1);
  border: 1px solid rgba(255,77,94,0.3);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  color: var(--bear);
  margin: 20px 0;
}

/* footer 提示 */
.footer-note {
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
  margin-top: 24px;
  line-height: 1.7;
}
.footer-note a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <a class="back" id="backBtn" href="javascript:history.back()">‹</a>
  <div>
    <div class="title">五式投票分析</div>
    <div class="ticker mono" id="tickerLabel">—</div>
  </div>
</div>

<div class="container" id="root">
  <div class="loading">分析中,請稍候</div>
</div>

<script>
// ════════════════════════════════════════════════
// 設定:GAS API 端點
// ════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

// ════════════════════════════════════════════════
// 解析 URL 參數
// ════════════════════════════════════════════════
function getParam(name) {
  const m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
  return m ? decodeURIComponent(m[1]) : '';
}

const userId = getParam('userId') || getParam('id');
const ticker = (getParam('ticker') || getParam('symbol') || '').toUpperCase();
const fastMode = getParam('fast') === '1';

document.getElementById('tickerLabel').textContent = ticker || '—';

// ════════════════════════════════════════════════
// JSONP 呼叫(GAS 跨域必備)
// ════════════════════════════════════════════════
function jsonp(url, callbackName, timeout) {
  return new Promise((resolve, reject) => {
    const cbName = callbackName + '_' + Date.now();
    const script = document.createElement('script');
    let timer;

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function() {
      cleanup();
      reject(new Error('Script load failed'));
    };

    timer = setTimeout(function() {
      cleanup();
      reject(new Error('Request timeout'));
    }, timeout || 30000);

    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

// ════════════════════════════════════════════════
// 主流程
// ════════════════════════════════════════════════
async function main() {
  if (!userId) {
    showError('沒有 userId 參數,請從持股頁面點進來');
    return;
  }
  if (!ticker) {
    showError('沒有 ticker 參數,請指定要分析的股票');
    return;
  }

  try {
    const url = GAS_URL +
      '?action=analyze' +
      '&userId=' + encodeURIComponent(userId) +
      '&symbol='  + encodeURIComponent(ticker) +
      (fastMode ? '&fast=1' : '');

    const data = await jsonp(url, 'analyze');

    if (!data || data.ok === false) {
      showError(data && data.error ? data.error : '分析失敗,請稍後再試');
      return;
    }

    render(data);
  } catch(e) {
    showError('連線失敗:' + e.message);
  }
}

// ════════════════════════════════════════════════
// 動作對照表(白話)
// ════════════════════════════════════════════════
const ACTION_MAP = {
  '加碼':   { icon:'🟢', cls:'bull', desc:'五式偏多,可考慮加碼' },
  '持有':   { icon:'⚪', cls:'hold', desc:'沒有明確訊號,維持原狀就好' },
  '賣1/3':  { icon:'🟡', cls:'bear', desc:'有空頭訊號,先賣 1/3 減壓' },
  '賣半':   { icon:'🟠', cls:'bear', desc:'空頭明顯,先賣一半保護本金' },
  '全出':   { icon:'🔴', cls:'bear', desc:'壓倒性看空,建議全部出場' }
};

const ACTION_BIG = {
  '加碼':   '可以多買',
  '持有':   '抱緊就好',
  '賣1/3':  '賣一點',
  '賣半':   '賣一半',
  '全出':   '全部賣掉'
};

// ════════════════════════════════════════════════
// 五式定義(顯示用,不是寫死規則)
// ════════════════════════════════════════════════
const MOVES = [
  { key: 'premium',  num: '01', name: '開盤溢價率',
    rule: '老練股神公式:開盤溢價 < 0% 看空、3-5% 健康看多、>5% 主力搶籌極強。盤後與收盤後不判斷。' },
  { key: 'candy',    num: '02', name: 'CANDY 戰法',
    rule: 'RA 親自從 CINDY 18 張截圖反推:7 子式加權評分 — 五均線守線、主力趨勢線、強度三要件、量比突變、MACD 背離、多頭排列、籌碼密集突破。' },
  { key: 'substack', num: '03', name: '大叔 Substack 文章',
    rule: 'Claude 分析最近一篇大叔的 Substack 文章對該股的看法,沒提到就棄權。' },
  { key: 'whale',    num: '04', name: '鯨魚偵測',
    rule: '量爆 + 漲跌方向:量比超過 2 倍且漲 = 機構吸籌、量比超過 2 倍且跌 = 機構出貨。量沒爆就棄權。' },
  { key: 'crash',    num: '05', name: '大跌 4 象限',
    rule: '股價沒大跌(跌 < 3%)時棄權。大跌觸發時看 RSI 判斷反彈機率:RSI<30 超賣可能反彈、>70 高位崩跌警戒。' }
];

// CANDY 7 子式名稱對照
const CANDY_SUB_NAMES = {
  s1_ma_hold:    '五均線守線',
  s2_main_line:  '主力趨勢線(彩虹MA)',
  s3_strength:   '強度三要件',
  s6_volratio:   '量比突變(查資金盤)',
  s7_macd_div:   'MACD 背離',
  s8_arrange:    '均線多空排列',
  s9_chip:       '籌碼密集突破'
};

// ════════════════════════════════════════════════
// 渲染主函式
// ════════════════════════════════════════════════
function render(data) {
  const root = document.getElementById('root');
  let html = '';

  // 大跌警報
  if (data.alert) {
    html += '<div class="alert-bar">'
         + '<span class="icon">⚠️</span>'
         + '<span>大跌警報觸發 — 動作已自動降級一級</span>'
         + '</div>';
  }

  // 主結論
  const action = data.action || '持有';
  const map = ACTION_MAP[action] || ACTION_MAP['持有'];
  const big = ACTION_BIG[action] || action;

  html += '<div class="conclusion ' + map.cls + '">'
       + '<div class="label">最終建議</div>'
       + '<div class="action-icon">' + map.icon + '</div>'
       + '<div class="action-text">' + escape(big) + '</div>'
       + '<div class="action-desc">' + escape(data.reason || map.desc) + '</div>'
       + '</div>';

  // 票數摘要
  const t = data.tally || { bullish:0, neutral:0, bearish:0, abstain:0 };
  html += '<div class="tally">'
       + tallyCell('b', t.bullish, '看多')
       + '<div class="tally-divider"></div>'
       + tallyCell('n', t.neutral, '中性')
       + '<div class="tally-divider"></div>'
       + tallyCell('r', t.bearish, '看空')
       + '<div class="tally-divider"></div>'
       + tallyCell('a', t.abstain, '棄權')
       + '</div>';

  // 五式詳情
  html += '<div class="section-title">五式投票詳情</div>';
  const votes = data.votes || {};
  for (const m of MOVES) {
    const v = votes[m.key] || { vote:'abstain', conf:0, note:'(無資料)' };
    html += renderMoveCard(m, v);
  }

  // 底部說明
  html += '<div class="footer-note">'
       + '點任一招式可展開查看判斷規則與原始數據<br>'
       + '<small>分析時間:' + formatTime(data.timestamp) + '</small>'
       + '</div>';

  root.innerHTML = html;

  // 綁定展開事件
  document.querySelectorAll('.move-card').forEach(card => {
    const header = card.querySelector('.move-header');
    header.addEventListener('click', () => card.classList.toggle('open'));
  });
}

function tallyCell(cls, num, lbl) {
  return '<div class="tally-cell ' + cls + '">'
       + '<div class="num">' + (num || 0) + '</div>'
       + '<div class="lbl">' + lbl + '</div>'
       + '</div>';
}

// ════════════════════════════════════════════════
// 招式卡渲染
// ════════════════════════════════════════════════
function renderMoveCard(move, v) {
  const voteLabel = voteLabelMap(v.vote);
  const voteCls = v.vote || 'abstain';
  const conf = (typeof v.conf === 'number') ? v.conf : 0;

  let html = '<div class="move-card ' + voteCls + '">'
           + '<div class="move-header">'
           +   '<div class="move-num mono">' + move.num + '</div>'
           +   '<div class="move-name">' + move.name + '</div>'
           +   '<div class="move-vote ' + voteCls + '">' + voteLabel + '</div>'
           +   '<div class="move-toggle">▾</div>'
           + '</div>'
           + '<div class="move-detail">';

  // 信心度
  html += '<div class="detail-row">'
       +   '<div class="k">信心度</div>'
       +   '<div class="v" style="display:flex;align-items:center;gap:8px;">'
       +     '<div class="conf-bar"><span style="width:' + Math.round(conf * 100) + '%"></span></div>'
       +     '<span>' + Math.round(conf * 100) + '%</span>'
       +   '</div>'
       + '</div>';

  // 判斷說明
  html += '<div class="detail-row">'
       +   '<div class="k">判斷</div>'
       +   '<div class="v note">' + escape(v.note || '—') + '</div>'
       + '</div>';

  // 原始數據(各招式不同欄位)
  if (v.raw) {
    html += renderRawData(move.key, v.raw);
  }

  // CANDY 7 子式
  if (move.key === 'candy' && v.raw && v.raw.sub) {
    html += '<div class="detail-section-title">7 個子指標明細</div>';
    html += '<div class="sub-list">';
    for (const subKey of Object.keys(CANDY_SUB_NAMES)) {
      const sub = v.raw.sub[subKey];
      if (!sub) continue;
      html += renderCandySub(subKey, sub);
    }
    html += '</div>';
  }

  // 招式規則說明
  html += '<div class="rule-box">'
       +   '<div class="rule-label">招式規則</div>'
       +   escape(move.rule)
       + '</div>';

  html += '</div></div>'; // 收 .move-detail .move-card
  return html;
}

function renderRawData(moveKey, raw) {
  let html = '';

  if (moveKey === 'premium') {
    if (typeof raw.pct === 'number') {
      html += detailRow('溢價率', raw.pct.toFixed(2) + '%');
    }
    if (raw.source) html += detailRow('資料來源', raw.source);
    if (raw.session) html += detailRow('盤別', sessionLabel(raw.session));
  }
  else if (moveKey === 'candy' && typeof raw.score === 'number') {
    html += detailRow('綜合分數', raw.score.toFixed(2));
  }
  else if (moveKey === 'substack' && raw.article) {
    if (raw.article.subject) html += detailRow('文章標題', raw.article.subject);
    if (raw.article.dateStr) html += detailRow('日期', raw.article.dateStr);
  }
  else if (moveKey === 'whale') {
    if (raw.whaleStr) html += detailRow('偵測結果', raw.whaleStr);
    if (typeof raw.vol === 'number') html += detailRow('成交量', formatNum(raw.vol));
    if (typeof raw.avgVol === 'number') html += detailRow('平均量', formatNum(raw.avgVol));
  }
  else if (moveKey === 'crash') {
    if (typeof raw.pct === 'number') html += detailRow('當日漲跌', raw.pct.toFixed(2) + '%');
    if (typeof raw.rsi === 'number') html += detailRow('RSI(14)', raw.rsi.toFixed(1));
    html += detailRow('警報狀態', raw.alert ? '已觸發 ⚠️' : '未觸發');
  }

  return html;
}

function renderCandySub(subKey, sub) {
  const name = CANDY_SUB_NAMES[subKey] || subKey;
  let scoreCls, scoreText;
  if (sub.score === null || typeof sub.score !== 'number') {
    scoreCls = 'null'; scoreText = 'N/A';
  } else if (sub.score > 0.1) {
    scoreCls = 'pos'; scoreText = '+' + sub.score.toFixed(2);
  } else if (sub.score < -0.1) {
    scoreCls = 'neg'; scoreText = sub.score.toFixed(2);
  } else {
    scoreCls = 'zero'; scoreText = sub.score.toFixed(2);
  }

  return '<div class="sub-item">'
       +   '<div class="sub-item-row">'
       +     '<div class="sub-name">' + name + '</div>'
       +     '<div class="sub-note">' + escape(sub.note || '—') + '</div>'
       +   '</div>'
       +   '<div class="sub-score ' + scoreCls + '">' + scoreText + '</div>'
       + '</div>';
}

function detailRow(k, v) {
  return '<div class="detail-row"><div class="k">' + escape(k) + '</div>'
       + '<div class="v">' + escape(String(v)) + '</div></div>';
}

// ════════════════════════════════════════════════
// 工具函式
// ════════════════════════════════════════════════
function voteLabelMap(vote) {
  switch(vote) {
    case 'bullish': return '看多';
    case 'bearish': return '看空';
    case 'neutral': return '中性';
    case 'abstain': return '棄權';
    default: return '—';
  }
}

function sessionLabel(s) {
  const map = { PRE:'盤前', REGULAR:'盤中', POST:'盤後', closed:'收盤後' };
  return map[s] || s;
}

function formatNum(n) {
  if (typeof n !== 'number') return String(n);
  if (n >= 1e9)  return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function formatTime(t) {
  if (!t) return '—';
  try {
    const d = new Date(t);
    const tw = new Date(d.getTime() + (8*60 + d.getTimezoneOffset())*60000);
    const pad = n => String(n).padStart(2, '0');
    return (tw.getMonth()+1) + '/' + tw.getDate() + ' ' + pad(tw.getHours()) + ':' + pad(tw.getMinutes());
  } catch(e) { return '—'; }
}

function escape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showError(msg) {
  document.getElementById('root').innerHTML =
    '<div class="error-box">⚠️ ' + escape(msg) + '</div>';
}

// 跑
main();
</script>
