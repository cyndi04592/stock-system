<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股神器 — 個股 5 式分析</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0A1E35;
    color: #FFFFFF;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 960px; margin: 0 auto; }

  /* 頂部 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .back-btn {
    background: #1a2e45;
    color: #F5A623;
    border: 1px solid #2a4060;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    text-decoration: none;
    display: inline-block;
  }
  .back-btn:hover { border-color: #F5A623; }
  .refresh-btn {
    background: #1a2e45;
    color: #F5A623;
    border: 1px solid #F5A623;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  h1 {
    color: #F5A623;
    font-size: 22px;
    font-weight: 700;
  }
  .subtitle {
    color: #a8b8c8;
    font-size: 13px;
    margin-top: 2px;
  }

  /* 大跌警報 */
  .alert-banner {
    background: linear-gradient(90deg, #FF4757, #c0392b);
    color: #FFFFFF;
    padding: 12px 18px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 14px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(255, 71, 87, 0.3);
  }

  /* 結論卡片 */
  .conclusion-card {
    background: linear-gradient(135deg, #1a2e45 0%, #243a55 100%);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    border: 2px solid;
    text-align: center;
  }
  .conclusion-card.bullish { border-color: #4ECDC4; }
  .conclusion-card.bearish { border-color: #FF4757; }
  .conclusion-card.neutral { border-color: #FFD93D; }
  .conclusion-card.insufficient { border-color: #5a6a80; }

  .conclusion-emoji {
    font-size: 48px;
    margin-bottom: 8px;
    line-height: 1;
  }
  .conclusion-label {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .conclusion-label.bullish { color: #4ECDC4; }
  .conclusion-label.bearish { color: #FF4757; }
  .conclusion-label.neutral { color: #FFD93D; }
  .conclusion-label.insufficient { color: #a8b8c8; }

  .conclusion-suggestion {
    font-size: 16px;
    color: #FFFFFF;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .conclusion-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    color: #a8b8c8;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .conclusion-stats strong { color: #F5A623; }

  /* 資訊區塊(持有期 / 槓桿耗損)*/
  .info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .info-card {
    background: #1a2e45;
    border-radius: 12px;
    padding: 16px;
    border-left: 4px solid;
  }
  .info-card .info-label {
    color: #a8b8c8;
    font-size: 12px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .info-card .info-main {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .info-card .info-sub {
    color: #a8b8c8;
    font-size: 12px;
    line-height: 1.5;
  }
  .lock-icon {
    font-size: 11px;
    margin-left: 4px;
    color: #F5A623;
  }
  .unclassified-warning {
    background: #2a2410;
    border: 1px solid #FFD93D;
    color: #FFD93D;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    margin-top: 6px;
    display: inline-block;
  }

  /* 5 式投票 */
  .votes-title {
    color: #F5A623;
    font-size: 16px;
    font-weight: 600;
    margin: 20px 0 10px 0;
  }
  .vote-card {
    background: #1a2e45;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    border-left: 4px solid #2a4060;
    transition: 0.2s;
  }
  .vote-card.bullish { border-left-color: #4ECDC4; }
  .vote-card.bearish { border-left-color: #FF4757; }
  .vote-card.neutral { border-left-color: #FFD93D; }
  .vote-card.abstain { border-left-color: #5a6a80; opacity: 0.7; }

  .vote-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .vote-name {
    font-size: 15px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .vote-name .formula-num {
    color: #F5A623;
    margin-right: 6px;
  }
  .vote-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 700;
  }
  .vote-badge.bullish { background: rgba(78, 205, 196, 0.15); color: #4ECDC4; }
  .vote-badge.bearish { background: rgba(255, 71, 87, 0.15); color: #FF4757; }
  .vote-badge.neutral { background: rgba(255, 217, 61, 0.15); color: #FFD93D; }
  .vote-badge.abstain { background: rgba(90, 106, 128, 0.2); color: #a8b8c8; }

  .vote-conf {
    color: #a8b8c8;
    font-size: 11px;
    margin-left: 6px;
  }
  .vote-note {
    color: #a8b8c8;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 6px;
  }
  .vote-toggle {
    color: #F5A623;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    user-select: none;
  }
  .vote-toggle:hover { text-decoration: underline; }

  /* CANDY 子式 */
  .sub-list {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #2a4060;
  }
  .sub-list.show { display: block; }
  .sub-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    padding: 6px 0;
    font-size: 12px;
    color: #a8b8c8;
    border-bottom: 1px dotted #2a4060;
  }
  .sub-item:last-child { border-bottom: none; }
  .sub-item .sub-name { color: #FFFFFF; }
  .sub-item .sub-val { font-weight: 600; }
  .sub-item .sub-val.bullish { color: #4ECDC4; }
  .sub-item .sub-val.bearish { color: #FF4757; }
  .sub-item .sub-val.neutral { color: #FFD93D; }
  .sub-item .sub-val.abstain { color: #5a6a80; }

  /* 原始資料表 */
  .raw-block {
    background: #0A1E35;
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 8px;
    font-family: monospace;
    font-size: 11px;
    color: #a8b8c8;
    word-break: break-all;
    line-height: 1.6;
  }

  /* jiansrc 理由 */
  .reason-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .reason-tag {
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    background: #0A1E35;
    border: 1px solid #2a4060;
  }
  .reason-tag.bull { color: #4ECDC4; border-color: #4ECDC4; }
  .reason-tag.bear { color: #FF4757; border-color: #FF4757; }

  /* 載入中 / 錯誤 */
  .state-box {
    background: #1a2e45;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    color: #a8b8c8;
  }
  .state-box.error { color: #FF4757; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid #2a4060;
    border-top-color: #F5A623;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    color: #5a6a80;
    font-size: 11px;
    margin-top: 24px;
    padding: 16px;
  }

  /* RWD */
  @media (max-width: 600px) {
    .info-row { grid-template-columns: 1fr; }
    .conclusion-emoji { font-size: 40px; }
    .conclusion-label { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <a href="dashboard_v5.html" class="back-btn" id="backBtn">← 回總覽</a>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAnalysis()">🔄 重新分析</button>
  </div>

  <h1 id="symbolTitle">載入中...</h1>
  <div class="subtitle" id="lastUpdate"></div>

  <!-- 大跌警報 -->
  <div id="alertBanner"></div>

  <!-- 結論 -->
  <div id="conclusion"></div>

  <!-- 持有期 + 槓桿耗損 -->
  <div id="infoRow"></div>

  <!-- 5 式投票 -->
  <div id="votesArea"></div>

  <!-- 狀態區 -->
  <div id="stateBox" class="state-box">
    <div class="spinner"></div>
    <div>跑 5 式分析中(可能要 20-40 秒)...</div>
  </div>

  <div class="footer">
    美股神器 v6.0 · 5 式投票:Premium / CANDY / Whale / Crash / Jiansrc
  </div>

</div>

<script>
// ========== 設定 ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';

const FORMULA_LABELS = {
  premium: { num: '式 1', name: '老練股神 · 開盤溢價率', emoji: '📈' },
  candy:   { num: '式 2', name: 'CANDY · 綜合戰法',       emoji: '🍬' },
  whale:   { num: '式 3', name: '鯨魚偵測 · 主力進出',     emoji: '🐳' },
  crash:   { num: '式 4', name: '大跌警報 · 心智圖',       emoji: '⚠️' },
  jiansrc: { num: '式 5', name: '熱題材 · 白名單偵測',     emoji: '🔥' }
};

const FORMULA_ORDER = ['premium', 'candy', 'whale', 'crash', 'jiansrc'];

const SUB_LABELS = {
  s1_ma_hold:     '5 均線守住',
  s2_main_line:   '主力趨勢線',
  s3_strength:    '強度三要件',
  s6_volratio:    '量比異常',
  s7_macd_div:    'MACD 背離',
  s8_arrange:     '均線排列',
  s9_chip:        '籌碼集中度'
};

const VOTE_BADGE = {
  bullish: { txt: '🟢 看多', cls: 'bullish' },
  bearish: { txt: '🔴 看空', cls: 'bearish' },
  neutral: { txt: '🟡 中性', cls: 'neutral' },
  abstain: { txt: '⚪ 棄權', cls: 'abstain' }
};

// ========== JSONP ==========
function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('請求逾時(60秒)'));
    }, 60000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cb] = (data) => {
      cleanup();
      resolve(data);
    };

    const qs = Object.entries({ ...params, callback: cb })
      .map(([k, v]) => `${k}=${encodeURIComponent(v)}`)
      .join('&');

    const script = document.createElement('script');
    script.src = `${url}?${qs}`;
    script.onerror = () => {
      cleanup();
      reject(new Error('網路錯誤'));
    };
    document.head.appendChild(script);
  });
}

// ========== 工具 ==========
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getParam(name) {
  return new URL(window.location.href).searchParams.get(name) || '';
}

function getUserId() {
  return getParam('userId') || localStorage.getItem('userId') || '';
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}

function fmtNum(v, digits = 2) {
  if (v == null || isNaN(v)) return '—';
  return Number(v).toFixed(digits);
}

// ========== 渲染 ==========
function renderAlert(votes) {
  const conc = votes.conclusion || {};
  const banner = document.getElementById('alertBanner');
  if (conc.alertNote && conc.alertNote.trim() !== '') {
    banner.innerHTML = `<div class="alert-banner">${escapeHtml(conc.alertNote)}</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function renderConclusion(votes) {
  const conc = votes.conclusion || {};
  const signal = conc.finalSignal || 'insufficient';
  const counts = conc.counts || {};

  const html = `<div class="conclusion-card ${signal}">
    <div class="conclusion-emoji">${conc.signalEmoji || '⚪'}</div>
    <div class="conclusion-label ${signal}">${escapeHtml(conc.signalLabel || '訊號不足')}</div>
    <div class="conclusion-suggestion">${escapeHtml(conc.suggestion || '—')}</div>
    <div class="conclusion-stats">
      <span>看多權重 <strong>${fmtNum(conc.bullishWeight, 2)}</strong></span>
      <span>看空權重 <strong>${fmtNum(conc.bearishWeight, 2)}</strong></span>
      <span>比值 <strong>${fmtNum(conc.ratio, 2)}</strong></span>
      <span>有效票 <strong>${counts.valid || 0}/5</strong></span>
    </div>
  </div>`;
  document.getElementById('conclusion').innerHTML = html;
}

function renderInfoRow(votes) {
  const hp = votes.holdingPeriod || {};
  const ld = votes.leverageDecay || {};

  // 持有期
  let hpHtml = '';
  if (hp.label) {
    const lockIcon = hp.locked ? '<span class="lock-icon">🔒 已鎖定</span>' : '';
    const warning = hp.isUnclassified ? '<div class="unclassified-warning">⚠️ 未分類,系統用預設規則</div>' : '';
    hpHtml = `<div class="info-card" style="border-left-color:${hp.color || '#5a6a80'};">
      <div class="info-label">📅 持有期分類${lockIcon}</div>
      <div class="info-main" style="color:${hp.color || '#FFF'};">${escapeHtml(hp.label)}</div>
      <div class="info-sub">${escapeHtml(hp.reason || '—')}</div>
      ${warning}
    </div>`;
  }

  // 槓桿耗損
  let ldHtml = '';
  if (ld.ok) {
    if (ld.isLeveraged) {
      const decayPct = ld.decayPct;
      const color = ld.decayColor || '#a8b8c8';
      const levelLabel = { mild: '輕微', warn: '警戒', severe: '嚴重' }[ld.decayLevel] || '—';
      ldHtml = `<div class="info-card" style="border-left-color:${color};">
        <div class="info-label">⚖️ 槓桿耗損(${ld.days || 90}天)</div>
        <div class="info-main" style="color:${color};">${decayPct != null ? fmtNum(decayPct, 2) + '% (' + levelLabel + ')' : '—'}</div>
        <div class="info-sub">
          標的 ${escapeHtml(ld.underlying || '?')}${ld.underlyingName ? '(' + escapeHtml(ld.underlyingName) + ')' : ''} · ${ld.multiplier || '?'}x<br>
          理論 ${fmtPct((ld.theoreticalReturn || 0) * 100)} → 實際 ${fmtPct((ld.actualReturn || 0) * 100)}
        </div>
      </div>`;
    } else {
      ldHtml = `<div class="info-card" style="border-left-color:#5a6a80;">
        <div class="info-label">⚖️ 槓桿耗損</div>
        <div class="info-main" style="color:#a8b8c8;">非槓桿 ETF</div>
        <div class="info-sub">${escapeHtml(ld.note || '無耗損計算')}</div>
      </div>`;
    }
  }

  document.getElementById('infoRow').innerHTML =
    (hpHtml || ldHtml) ? `<div class="info-row">${hpHtml}${ldHtml}</div>` : '';
}

function renderSubList(candy) {
  const raw = candy.raw || {};
  const sub = raw.sub || {};
  if (!sub || Object.keys(sub).length === 0) {
    return '<div class="raw-block">CANDY 子式資料未取得</div>';
  }
  const items = Object.entries(SUB_LABELS).map(([key, label]) => {
    const v = sub[key];
    if (v == null) {
      return `<div class="sub-item">
        <span class="sub-name">${label}</span>
        <span class="sub-val abstain">— 未取得</span>
      </div>`;
    }
    // sub 可能是字串 vote、或物件 {vote, conf}
    let vote = typeof v === 'string' ? v : (v.vote || 'abstain');
    let conf = typeof v === 'object' ? v.conf : null;
    const badge = VOTE_BADGE[vote] || VOTE_BADGE.abstain;
    return `<div class="sub-item">
      <span class="sub-name">${label}</span>
      <span class="sub-val ${badge.cls}">${badge.txt}${conf != null ? ' (' + fmtNum(conf, 2) + ')' : ''}</span>
    </div>`;
  }).join('');
  const score = raw.score != null ? `<div style="color:#F5A623;font-size:12px;margin-bottom:8px;">CANDY 綜合分數: ${fmtNum(raw.score, 2)}</div>` : '';
  return score + items;
}

function renderRawBlock(key, raw) {
  if (!raw || typeof raw !== 'object') return '';
  const items = [];

  if (key === 'premium') {
    if (raw.pct != null) items.push(`溢價率: ${fmtPct(raw.pct)}`);
    if (raw.session) items.push(`時段: ${raw.session}`);
    if (raw.source) items.push(`資料源: ${raw.source}`);
  } else if (key === 'whale') {
    if (raw.vol != null && raw.avgVol != null) {
      items.push(`成交量: ${Number(raw.vol).toLocaleString()}`);
      items.push(`平均量: ${Number(raw.avgVol).toLocaleString()}`);
      items.push(`量比: ${fmtNum(raw.vol / raw.avgVol, 2)}x`);
    }
    if (raw.whaleStr) items.push(`鯨魚強度: ${raw.whaleStr}`);
  } else if (key === 'crash') {
    if (raw.pct != null) items.push(`漲跌: ${fmtPct(raw.pct)}`);
    if (raw.alert) items.push(`警報: ${raw.alert}`);
    if (raw.rsi != null) items.push(`RSI: ${fmtNum(raw.rsi, 1)}`);
  } else if (key === 'jiansrc') {
    if (raw.bullScore != null) items.push(`多頭分: ${fmtNum(raw.bullScore, 2)}`);
    if (raw.bearScore != null) items.push(`空頭分: ${fmtNum(raw.bearScore, 2)}`);
    if (raw.netScore != null) items.push(`淨分: ${fmtNum(raw.netScore, 2)}`);
  }

  let html = items.length ? `<div class="raw-block">${items.join(' · ')}</div>` : '';

  // jiansrc 理由標籤
  if (key === 'jiansrc' && raw.reasons) {
    const bull = (raw.reasons.bullish || []).map(r => `<span class="reason-tag bull">+ ${escapeHtml(r)}</span>`).join('');
    const bear = (raw.reasons.bearish || []).map(r => `<span class="reason-tag bear">− ${escapeHtml(r)}</span>`).join('');
    if (bull || bear) {
      html += `<div class="reason-list">${bull}${bear}</div>`;
    }
  }

  return html;
}

function renderVotes(votes) {
  const wrap = document.getElementById('votesArea');
  let html = '<div class="votes-title">🗳️ 5 式投票結果</div>';

  FORMULA_ORDER.forEach(key => {
    const v = votes[key];
    if (!v) {
      html += `<div class="vote-card abstain">
        <div class="vote-header">
          <div class="vote-name"><span class="formula-num">${FORMULA_LABELS[key].num}</span>${FORMULA_LABELS[key].emoji} ${FORMULA_LABELS[key].name}</div>
          <span class="vote-badge abstain">⚪ 未取得</span>
        </div>
        <div class="vote-note">後端未回傳此式資料</div>
      </div>`;
      return;
    }

    const vote = v.vote || 'abstain';
    const badge = VOTE_BADGE[vote] || VOTE_BADGE.abstain;
    const conf = v.conf != null ? `<span class="vote-conf">conf ${fmtNum(v.conf, 2)}</span>` : '';
    const lbl = FORMULA_LABELS[key];
    const isCandy = (key === 'candy');

    html += `<div class="vote-card ${badge.cls}">
      <div class="vote-header">
        <div class="vote-name"><span class="formula-num">${lbl.num}</span>${lbl.emoji} ${lbl.name}</div>
        <div><span class="vote-badge ${badge.cls}">${badge.txt}</span>${conf}</div>
      </div>
      <div class="vote-note">${escapeHtml(v.note || '—')}</div>
      ${renderRawBlock(key, v.raw)}
      ${isCandy ? `<div class="vote-toggle" onclick="toggleSub('candySub')">▾ 展開 7 子式</div>
                   <div class="sub-list" id="candySub">${renderSubList(v)}</div>` : ''}
    </div>`;
  });

  wrap.innerHTML = html;
}

function toggleSub(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('show');
    const toggle = el.previousElementSibling;
    if (toggle && toggle.classList.contains('vote-toggle')) {
      toggle.textContent = el.classList.contains('show') ? '▴ 收合' : '▾ 展開 7 子式';
    }
  }
}

function renderUpdate(data) {
  const ts = data.timestamp ? new Date(data.timestamp) : new Date();
  document.getElementById('lastUpdate').textContent = `分析時間: ${ts.toLocaleString('zh-TW', { hour12: false })}`;
}

// ========== 主流程 ==========
async function loadAnalysis() {
  const symbol = getParam('symbol').toUpperCase();
  const userId = getUserId();

  if (!symbol) {
    document.getElementById('symbolTitle').textContent = '⚠️ 缺少股票代號';
    document.getElementById('stateBox').className = 'state-box error';
    document.getElementById('stateBox').innerHTML = '請從 dashboard 點選股票進入,或檢查 URL 是否有 ?symbol=XXX';
    return;
  }

  if (!userId) {
    document.getElementById('symbolTitle').textContent = `${symbol}`;
    document.getElementById('stateBox').className = 'state-box error';
    document.getElementById('stateBox').innerHTML = '⚠️ 缺少 userId,請先到 dashboard 登入';
    return;
  }

  document.getElementById('symbolTitle').textContent = `📊 ${symbol} · 5 式分析`;

  const btn = document.getElementById('refreshBtn');
  const stateBox = document.getElementById('stateBox');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';
  stateBox.className = 'state-box';
  stateBox.innerHTML = '<div class="spinner"></div><div>跑 5 式分析中(可能要 20-40 秒)...</div>';
  stateBox.style.display = 'block';

  // 清空舊內容
  document.getElementById('alertBanner').innerHTML = '';
  document.getElementById('conclusion').innerHTML = '';
  document.getElementById('infoRow').innerHTML = '';
  document.getElementById('votesArea').innerHTML = '';

  try {
    const data = await jsonp(API_URL, { action: 'analyze', userId, symbol });

    if (!data || data.ok !== true) {
      throw new Error(data && data.error ? data.error : '回傳格式錯誤');
    }

    const votes = data.votes || {};

    renderAlert(votes);
    renderConclusion(votes);
    renderInfoRow(votes);
    renderVotes(votes);
    renderUpdate(data);
    stateBox.style.display = 'none';

  } catch (err) {
    console.error('[analyze] 失敗', err);
    stateBox.className = 'state-box error';
    stateBox.innerHTML = `❌ 分析失敗: ${escapeHtml(err.message || String(err))}<br><br>
      <button class="refresh-btn" onclick="loadAnalysis()">重試</button>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 重新分析';
  }
}

// 啟動
loadAnalysis();
</script>
