<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股神器 — 我的持股總覽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0A1E35;
    color: #FFFFFF;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 960px; margin: 0 auto; }

  /* 頂部 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 {
    color: #F5A623;
    font-size: 22px;
    font-weight: 700;
  }
  .header .subtitle {
    color: #a8b8c8;
    font-size: 13px;
    margin-top: 2px;
  }
  .refresh-btn {
    background: #1a2e45;
    color: #F5A623;
    border: 1px solid #F5A623;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
  }
  .refresh-btn:hover { background: #F5A623; color: #0A1E35; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 市場狀態徽章 */
  .market-bar {
    background: #1a2e45;
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #0A1E35;
    border: 1px solid #2a4060;
  }
  .badge.open { color: #4ECDC4; border-color: #4ECDC4; }
  .badge.closed { color: #a8b8c8; }
  .badge.pre, .badge.post { color: #FFD93D; border-color: #FFD93D; }
  .badge.dst { color: #F5A623; border-color: #F5A623; }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 大盤指標 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .market-card {
    background: #1a2e45;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .market-card .label {
    color: #a8b8c8;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .market-card .price {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .market-card .pct {
    font-size: 13px;
    font-weight: 600;
  }
  .pct.up { color: #4ECDC4; }
  .pct.down { color: #FF4757; }
  .pct.neutral { color: #a8b8c8; }

  /* 總損益 */
  .summary {
    background: linear-gradient(135deg, #1a2e45 0%, #243a55 100%);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .summary-item .label {
    color: #a8b8c8;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .summary-item .value {
    font-size: 18px;
    font-weight: 700;
  }
  .summary-item .value.big { font-size: 22px; }

  /* 持股卡片 */
  .holdings-title {
    color: #F5A623;
    font-size: 16px;
    font-weight: 600;
    margin: 16px 0 10px 0;
  }
  .holding-card {
    background: #1a2e45;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid transparent;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 24px;
    gap: 10px;
    align-items: center;
  }
  .holding-card:hover {
    border-color: #F5A623;
    transform: translateX(2px);
  }
  .h-ticker {
    font-size: 17px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .h-shares {
    color: #a8b8c8;
    font-size: 12px;
    margin-top: 2px;
  }
  .h-col-label {
    color: #a8b8c8;
    font-size: 11px;
    margin-bottom: 2px;
  }
  .h-price {
    font-size: 15px;
    font-weight: 600;
  }
  .h-profit {
    font-size: 14px;
    font-weight: 700;
  }
  .h-arrow {
    color: #F5A623;
    font-size: 18px;
    text-align: right;
  }
  .session-tag {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    margin-left: 6px;
    background: #0A1E35;
    color: #a8b8c8;
    border: 1px solid #2a4060;
  }
  .session-tag.PRE { color: #FFD93D; border-color: #FFD93D; }
  .session-tag.POST { color: #FFD93D; border-color: #FFD93D; }
  .session-tag.REGULAR { color: #4ECDC4; border-color: #4ECDC4; }

  /* 載入中 / 錯誤 */
  .state-box {
    background: #1a2e45;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    color: #a8b8c8;
  }
  .state-box.error { color: #FF4757; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid #2a4060;
    border-top-color: #F5A623;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* userId 輸入彈窗 */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #1a2e45;
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
    border: 1px solid #F5A623;
  }
  .modal h2 {
    color: #F5A623;
    font-size: 18px;
    margin-bottom: 8px;
  }
  .modal p {
    color: #a8b8c8;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .modal input {
    width: 100%;
    background: #0A1E35;
    border: 1px solid #2a4060;
    color: #FFFFFF;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: monospace;
    margin-bottom: 12px;
  }
  .modal input:focus { outline: none; border-color: #F5A623; }
  .modal button {
    background: #F5A623;
    color: #0A1E35;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    font-size: 14px;
  }

  .footer {
    text-align: center;
    color: #5a6a80;
    font-size: 11px;
    margin-top: 24px;
    padding: 16px;
  }

  /* RWD */
  @media (max-width: 600px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .summary-item:first-child { grid-column: 1 / -1; }
    .holding-card {
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .holding-card .h-col-shares-row { grid-column: 1 / -1; }
    .h-arrow { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>📊 我的持股總覽</h1>
      <div class="subtitle" id="lastUpdate">載入中...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()">🔄 重新整理</button>
  </div>

  <!-- 市場狀態徽章 -->
  <div class="market-bar" id="marketBar" style="display:none;"></div>

  <!-- 大盤指標 -->
  <div class="market-grid" id="marketGrid"></div>

  <!-- 總損益 -->
  <div class="summary" id="summary" style="display:none;"></div>

  <!-- 持股 -->
  <div class="holdings-title" id="holdingsTitle" style="display:none;">💼 我的持股</div>
  <div id="holdings"></div>

  <!-- 狀態區 -->
  <div id="stateBox" class="state-box">
    <div class="spinner"></div>
    <div>載入持股資料中...</div>
  </div>

  <div class="footer">
    美股神器 v6.0 · Powered by GAS + Claude
  </div>

</div>

<!-- userId 輸入彈窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>👤 請輸入你的 LINE User ID</h2>
    <p>第一次使用?從 LINE @368ceoiv 取得 userId 後貼進來。儲存後不用再輸入。</p>
    <input id="userIdInput" placeholder="U657f8f31ab...">
    <button onclick="saveUserId()">儲存並載入</button>
  </div>
</div>

<script>
// ========== 設定 ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbzjaRxJhYkqNIaJaFxvSiy0L120H0m0k7NY_Vc6IXIw70kO2SIvf3fOf26TnhApTgrg/exec';
const STOCK_PAGE = 'stock_12steps.html'; // 個股分析頁(同目錄)

// ========== JSONP helper ==========
function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('請求逾時(30秒)'));
    }, 30000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cb] = (data) => {
      cleanup();
      resolve(data);
    };

    const qs = Object.entries({ ...params, callback: cb })
      .map(([k, v]) => `${k}=${encodeURIComponent(v)}`)
      .join('&');

    const script = document.createElement('script');
    script.src = `${url}?${qs}`;
    script.onerror = () => {
      cleanup();
      reject(new Error('網路錯誤,API 連不上'));
    };
    document.head.appendChild(script);
  });
}

// ========== userId 取得 ==========
function getUserId() {
  const url = new URL(window.location.href);
  const fromUrl = url.searchParams.get('userId');
  if (fromUrl) {
    localStorage.setItem('userId', fromUrl);
    return fromUrl;
  }
  return localStorage.getItem('userId') || '';
}

function saveUserId() {
  const v = document.getElementById('userIdInput').value.trim();
  if (!v.startsWith('U') || v.length < 30) {
    alert('userId 格式錯誤,應該是 U 開頭的長字串');
    return;
  }
  localStorage.setItem('userId', v);
  document.getElementById('modal').classList.remove('show');
  loadDashboard();
}

// ========== 工具 ==========
function fmtPrice(v) {
  if (v == null || isNaN(v)) return '—';
  return Number(v).toFixed(2);
}

function fmtMoney(v, currency = 'USD') {
  if (v == null || isNaN(v)) return '—';
  const sign = v >= 0 ? '+' : '';
  const fixed = Number(v).toFixed(2);
  return currency === 'TWD' ? `${sign}NT$${Number(fixed).toLocaleString()}` : `${sign}$${Number(fixed).toLocaleString()}`;
}

function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}

function pctClass(v) {
  if (v == null || isNaN(v) || v === 0) return 'neutral';
  return v > 0 ? 'up' : 'down';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ========== 渲染 ==========
function renderMarketBar(data) {
  const bar = document.getElementById('marketBar');
  const items = [];

  // 美股
  const usMap = {
    'PRE': { cls: 'pre', txt: '🌅 美股盤前' },
    'OPEN': { cls: 'open', txt: '🟢 美股交易中', dot: true },
    'POST': { cls: 'post', txt: '🌆 美股盤後' },
    'CLOSED': { cls: 'closed', txt: '⚫ 美股休市' },
    'HOLIDAY': { cls: 'closed', txt: '🎉 美股假日' }
  };
  const us = usMap[data.marketUS] || { cls: 'closed', txt: `美股 ${data.marketUS || '?'}` };
  items.push(`<span class="badge ${us.cls}">${us.dot ? '<span class="dot"></span>' : ''}${us.txt}</span>`);

  // 台股
  const twMap = {
    'OPEN': { cls: 'open', txt: '🟢 台股交易中', dot: true },
    'CLOSED': { cls: 'closed', txt: '⚫ 台股收盤' },
    'HOLIDAY': { cls: 'closed', txt: '🎉 台股假日' }
  };
  const tw = twMap[data.marketTW] || { cls: 'closed', txt: `台股 ${data.marketTW || '?'}` };
  items.push(`<span class="badge ${tw.cls}">${tw.dot ? '<span class="dot"></span>' : ''}${tw.txt}</span>`);

  // 夏令
  if (data.isDST) {
    items.push(`<span class="badge dst">☀️ 夏令時間</span>`);
  }

  // 匯率
  if (data.fx) {
    items.push(`<span class="badge">💱 USD/TWD ${Number(data.fx).toFixed(2)}</span>`);
  }

  bar.innerHTML = items.join('');
  bar.style.display = 'flex';
}

function renderMarket(data) {
  const grid = document.getElementById('marketGrid');
  const m = data.market || {};
  const cards = [
    { k: 'sp500', label: 'S&P 500' },
    { k: 'nasdaq', label: 'Nasdaq' },
    { k: 'vix', label: 'VIX 恐慌指數' }
  ];
  grid.innerHTML = cards.map(c => {
    const d = m[c.k];
    if (!d) {
      return `<div class="market-card">
        <div class="label">${c.label}</div>
        <div class="price">—</div>
        <div class="pct neutral">資料未取得</div>
      </div>`;
    }
    return `<div class="market-card">
      <div class="label">${c.label}</div>
      <div class="price">${fmtPrice(d.price)}</div>
      <div class="pct ${pctClass(d.pct)}">${fmtPct(d.pct)}</div>
    </div>`;
  }).join('');
}

function renderSummary(data) {
  const holdings = data.holdings || [];
  if (holdings.length === 0) {
    document.getElementById('summary').style.display = 'none';
    return;
  }

  // 總成本 / 總市值 / 總損益(USD)
  let totalCost = 0, totalValue = 0;
  holdings.forEach(h => {
    const cost = (h.avgPrice || 0) * (h.shares || 0);
    const value = (h.currentPrice || 0) * (h.shares || 0);
    totalCost += cost;
    totalValue += value;
  });
  const profitUSD = totalValue - totalCost;
  const profitPct = totalCost > 0 ? (profitUSD / totalCost * 100) : 0;
  const fx = data.fx || 0;
  const profitTWD = fx > 0 ? profitUSD * fx : 0;

  const cls = pctClass(profitUSD);
  const sum = document.getElementById('summary');
  sum.innerHTML = `
    <div class="summary-item">
      <div class="label">總損益(USD)</div>
      <div class="value big ${cls}">${fmtMoney(profitUSD)} (${fmtPct(profitPct)})</div>
    </div>
    <div class="summary-item">
      <div class="label">總市值</div>
      <div class="value">$${totalValue.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
    </div>
    <div class="summary-item">
      <div class="label">${fx > 0 ? '損益(TWD)' : '總成本'}</div>
      <div class="value ${fx > 0 ? cls : ''}">${fx > 0 ? fmtMoney(profitTWD, 'TWD') : '$' + totalCost.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
    </div>
  `;
  sum.style.display = 'grid';
}

function renderHoldings(data) {
  const holdings = data.holdings || [];
  const titleEl = document.getElementById('holdingsTitle');
  const list = document.getElementById('holdings');

  if (holdings.length === 0) {
    list.innerHTML = `<div class="state-box">尚未上傳持股 — 請到 LINE @368ceoiv 上傳券商截圖</div>`;
    titleEl.style.display = 'none';
    return;
  }

  titleEl.style.display = 'block';
  list.innerHTML = holdings.map(h => {
    const profitCls = pctClass(h.profitUSD);
    const sessionTag = h.session ? `<span class="session-tag ${h.session}">${h.session}</span>` : '';
    const userId = getUserId();
    const link = `${STOCK_PAGE}?symbol=${encodeURIComponent(h.ticker)}&userId=${encodeURIComponent(userId)}`;
    return `<div class="holding-card" onclick="window.open('${link}', '_blank')">
      <div>
        <div class="h-ticker">${escapeHtml(h.ticker)}${sessionTag}</div>
        <div class="h-shares">${(h.shares || 0).toLocaleString()} 股 @ $${fmtPrice(h.avgPrice)}</div>
      </div>
      <div>
        <div class="h-col-label">現價</div>
        <div class="h-price">$${fmtPrice(h.currentPrice)}</div>
      </div>
      <div>
        <div class="h-col-label">漲跌</div>
        <div class="h-price pct ${pctClass(h.pct)}">${fmtPct(h.pct)}</div>
      </div>
      <div>
        <div class="h-col-label">損益</div>
        <div class="h-profit ${profitCls}">${fmtMoney(h.profitUSD)}</div>
        <div class="h-col-label" style="margin-top:2px;">${fmtPct(h.profitPct)}</div>
      </div>
      <div class="h-arrow">›</div>
    </div>`;
  }).join('');
}

function renderUpdate(data) {
  const el = document.getElementById('lastUpdate');
  const ts = data.timestamp ? new Date(data.timestamp) : new Date();
  el.textContent = `最後更新: ${ts.toLocaleString('zh-TW', { hour12: false })}`;
}

// ========== 主流程 ==========
async function loadDashboard() {
  const userId = getUserId();
  if (!userId) {
    document.getElementById('modal').classList.add('show');
    document.getElementById('stateBox').innerHTML = '請輸入 userId 開始使用';
    return;
  }

  const btn = document.getElementById('refreshBtn');
  const stateBox = document.getElementById('stateBox');
  btn.disabled = true;
  btn.textContent = '⏳ 載入中...';
  stateBox.className = 'state-box';
  stateBox.innerHTML = '<div class="spinner"></div><div>載入持股資料中...</div>';
  stateBox.style.display = 'block';

  try {
    const data = await jsonp(API_URL, { action: 'dashboard', userId });

    if (!data || data.ok !== true) {
      throw new Error(data && data.error ? data.error : '回傳格式錯誤(沒拿到 ok:true)');
    }

    renderMarketBar(data);
    renderMarket(data);
    renderSummary(data);
    renderHoldings(data);
    renderUpdate(data);
    stateBox.style.display = 'none';

  } catch (err) {
    console.error('[dashboard] 載入失敗', err);
    stateBox.className = 'state-box error';
    stateBox.innerHTML = `❌ 載入失敗: ${escapeHtml(err.message || String(err))}<br><br>
      <button class="refresh-btn" onclick="loadDashboard()">重試</button>
      <button class="refresh-btn" style="margin-left:8px;" onclick="changeUserId()">換 userId</button>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 重新整理';
  }
}

function changeUserId() {
  const cur = getUserId();
  document.getElementById('userIdInput').value = cur;
  document.getElementById('modal').classList.add('show');
}

// 啟動
loadDashboard();
</script>

</body>
</html>
